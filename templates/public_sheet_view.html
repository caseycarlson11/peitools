<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Spreadsheet — {{ job }} | PEI</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#e6edf3; --text2:#8b949e; --blue:#60b4f0; --green:#3fb950; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    .bar {
      display:flex; align-items:center; gap:10px; padding:9px 14px;
      background:var(--surface); border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:50; flex-wrap:wrap;
    }
    .logo { width:26px; height:26px; border-radius:6px; object-fit:cover; flex-shrink:0; }
    .ttl { display:flex; flex-direction:column; min-width:0; flex:1; }
    .ttl .t1 { font-size:.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ttl .t2 { font-size:.7rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bbtn {
      display:inline-flex; align-items:center; gap:5px;
      background:var(--bg); color:var(--text); border:1px solid var(--border);
      padding:7px 12px; border-radius:8px; font-family:inherit; font-size:.78rem;
      font-weight:600; cursor:pointer; text-decoration:none; white-space:nowrap;
    }
    .bbtn:hover { border-color:var(--blue); }
    .wrap { flex:1; overflow:auto; padding:14px; -webkit-overflow-scrolling:touch; }
    table { border-collapse:collapse; font-size:.82rem; background:var(--surface);
            border:1px solid var(--border); border-radius:8px; }
    th, td { border:1px solid var(--border); padding:6px 12px; text-align:left; white-space:nowrap; }
    th { background:#1c2230; font-weight:700; color:var(--blue); position:sticky; top:0; }
    tr:nth-child(even) td { background:rgba(255,255,255,.02); }
    td a { color:var(--blue); }
    .load { color:var(--text2); text-align:center; padding:40px 16px; font-size:.9rem; }
    .toast {
      position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
      background:#238636; color:#fff; border:1px solid var(--green);
      padding:10px 18px; border-radius:10px; font-size:.84rem; font-weight:600;
      box-shadow:0 6px 24px rgba(0,0,0,.5); display:none; z-index:99; text-align:center;
    }
    .toast.show { display:block; }
    /* View / Edit chooser for panel numbers (logged-in users) */
    .pmenu {
      position:fixed; z-index:100; display:none; flex-direction:column; min-width:170px;
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      box-shadow:0 10px 30px rgba(0,0,0,.55); overflow:hidden;
    }
    .pmenu.open { display:flex; }
    .pmenu .pm-title { font-size:.72rem; font-weight:700; color:var(--text2);
      padding:8px 12px 4px; text-transform:uppercase; letter-spacing:.05em; }
    .pmenu a { display:flex; align-items:center; gap:8px; padding:10px 14px;
      color:var(--text); text-decoration:none; font-size:.86rem; font-weight:600; }
    .pmenu a:hover { background:rgba(96,180,240,.1); color:var(--blue); }
    .pmenu a .sub { font-size:.7rem; color:var(--text2); font-weight:400; margin-left:auto; }
  </style>
</head>
<body>
  <div class="bar">
    <img class="logo" src="/static/logo.jpg" alt="PEI">
    <div class="ttl">
      <span class="t1">Job Spreadsheet — {{ job }}</span>
      <span class="t2">{{ fname }} · Pacific Erectors Inc.</span>
    </div>
    <a class="bbtn" href="/pl/{{ token }}/file?dl=1">⬇ Download</a>
    <button class="bbtn" onclick="openGoogleSheets()">📊 Open in Google Sheets</button>
  </div>
  <div class="wrap" id="wrap"><div class="load">Loading spreadsheet…</div></div>
  <div class="toast" id="toast"></div>
  <div class="pmenu" id="pmenu">
    <div class="pm-title" id="pmTitle">Panel</div>
    <a id="pmView" target="_blank" rel="noopener">👁 View <span class="sub">public print</span></a>
    <a id="pmEdit" target="_blank" rel="noopener">✎ Edit <span class="sub">Review &amp; Fix</span></a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    const SHEETS_URL = {{ (sheets_url or '') | tojson }};
    const PL_PUBLIC_URL = {{ (pl_public_url or '') | tojson }};
    const PANELS_ONLY_URL = {{ (panels_only_url or '') | tojson }};
    const LOGGED_IN = {{ 'true' if logged_in else 'false' }};
    const REVIEW_URL = '/panel-tracking/' + encodeURIComponent({{ job | tojson }}) + '/review';
    // Logged in → Review & Fix. Not logged in → public Panels-Only prints,
    // zoomed to the clicked panel (or no link if that doc isn't public yet).
    const PANEL_BASE = LOGGED_IN ? REVIEW_URL : PANELS_ONLY_URL;
    let rows = [];   // array of arrays, for TSV export

    fetch('/pl/{{ token }}/file').then(r=>{
      if (!r.ok) throw new Error('HTTP '+r.status);
      return r.arrayBuffer();
    }).then(buf=>{
      const wb = XLSX.read(buf, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
      // Find the linkable columns by header name
      const heads = (rows[0] || []).map(h => String(h).trim().toLowerCase());
      const panelCol = heads.indexOf('panel number');
      const plCol    = heads.indexOf('packing list');
      let html = '<table>';
      rows.forEach((r,i)=>{
        html += '<tr>' + r.map((c,ci)=>{
          const v = esc(c);
          let cell = v;
          if (i > 0 && c !== '') {
            if (ci === panelCol) {
              const n = encodeURIComponent(String(c));
              if (LOGGED_IN && PANELS_ONLY_URL) {
                // Logged in with a live public print: offer View / Edit chooser
                cell = `<a href="${REVIEW_URL}?panel=${n}" class="plink" data-panel="${v}">${v}</a>`;
              } else if (PANEL_BASE) {
                // One destination only: public print (logged out) or Review (no public print)
                cell = `<a href="${PANEL_BASE}?panel=${n}" target="_blank" rel="noopener">${v}</a>`;
              }
            } else if (ci === plCol && PL_PUBLIC_URL) {
              // Packing list → public combined doc, jumped to its bookmark
              cell = `<a href="${PL_PUBLIC_URL}?goto=${encodeURIComponent(String(c))}" target="_blank" rel="noopener">${v}</a>`;
            } else if (/^https?:\/\//.test(String(c))) {
              cell = `<a href="${v}" target="_blank">${v}</a>`;
            }
          }
          return i===0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
        }).join('') + '</tr>';
      });
      html += '</table>';
      document.getElementById('wrap').innerHTML = html;
    }).catch(()=>{
      document.getElementById('wrap').innerHTML =
        '<div class="load">Could not load the spreadsheet. ' +
        'The link may have been replaced — ask for a new one.</div>';
    });

    function toast(msg){
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'), 3500);
    }

    // ── View / Edit chooser (logged-in panel clicks) ──
    const pmenu = document.getElementById('pmenu');
    document.getElementById('wrap').addEventListener('click', e=>{
      const a = e.target.closest('a.plink');
      if (!a) return;
      e.preventDefault();
      const p = a.dataset.panel;
      const n = encodeURIComponent(p);
      document.getElementById('pmTitle').textContent = 'Panel ' + p;
      document.getElementById('pmView').href = `${PANELS_ONLY_URL}?panel=${n}`;
      document.getElementById('pmEdit').href = `${REVIEW_URL}?panel=${n}`;
      const r = a.getBoundingClientRect();
      pmenu.classList.add('open');
      const mw = pmenu.offsetWidth, mh = pmenu.offsetHeight;
      let x = r.right + 8, y = r.top - 4;
      if (x + mw > window.innerWidth - 8)  x = Math.max(8, r.left - mw - 8);
      if (y + mh > window.innerHeight - 8) y = Math.max(8, window.innerHeight - mh - 8);
      pmenu.style.left = x + 'px';
      pmenu.style.top  = y + 'px';
    });
    document.addEventListener('click', e=>{
      if (!pmenu.classList.contains('open')) return;
      if (e.target.closest('#pmenu') || e.target.closest('a.plink')) return;
      pmenu.classList.remove('open');
    });
    pmenu.addEventListener('click', ()=> setTimeout(()=>pmenu.classList.remove('open'), 100));
    document.getElementById('wrap').addEventListener('scroll', ()=>pmenu.classList.remove('open'));

    function openGoogleSheets(){
      // Copy the data as TSV so it can be pasted straight into the sheet,
      // then open the job's linked Google Sheet (or a brand-new one).
      const tsv = rows.map(r=>r.join('\t')).join('\n');
      const open = ()=> window.open(SHEETS_URL || 'https://sheets.new', '_blank');
      const note = SHEETS_URL
        ? 'Data copied — press Ctrl+V (⌘V on iPad/Mac) in the sheet to paste the latest data.'
        : 'Data copied — press Ctrl+V (⌘V) in the new sheet to paste.';
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(tsv).then(()=>{ toast(note); open(); })
          .catch(()=>{ open(); });
      } else {
        const ta = document.createElement('textarea');
        ta.value = tsv; document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); toast(note); }catch(_){}
        document.body.removeChild(ta); open();
      }
    }
  </script>
</body>
</html>
