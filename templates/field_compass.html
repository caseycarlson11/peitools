<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Field Compass | PEI Tools</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --card:    #1c2230;
      --border:  #30363d;
      --text:    #e6edf3;
      --text2:   #8b949e;
      --blue:    #60b4f0;
      --red:     #DB1523;
      --green:   #3fb950;
      --accent:  rgba(96,180,240,0.12);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

    /* ── Header ── */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-img { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; }
    .site-name { font-size: 0.88rem; font-weight: 800; }
    .site-name .blue { color: var(--blue); }
    .site-name .dim  { color: var(--text2); font-weight: 400; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none; font-size: 0.8rem; font-weight: 600;
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text2); }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; height: calc(100vh - 53px); }
    .screen.active { display: flex; }

    /* ── Step 1: Job picker ── */
    .step-header {
      padding: 16px 20px 10px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text2);
      border-bottom: 1px solid var(--border);
    }
    .job-grid {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 6px;
      align-items: flex-start;
    }
    .job-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 12px;
    }
    .job-card:hover, .job-card:active { border-color: var(--blue); background: var(--accent); }
    .job-card-icon {
      width: 30px; height: 30px; border-radius: 7px;
      background: rgba(96,180,240,0.15); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .job-card-icon svg { width: 15px; height: 15px; stroke: var(--blue); fill: none; stroke-width: 2; }
    .job-card-name { font-size: 0.9rem; font-weight: 700; line-height: 1.3; flex: 1; }
    .job-card-arrow { color: var(--text2); font-size: 1rem; }

    /* ── Step 2: File picker ── */
    .file-screen-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .btn-back-step {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); border-radius: 8px; padding: 6px 12px;
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    }
    .btn-back-step:hover { border-color: var(--blue); color: var(--blue); }
    .screen-title { font-size: 0.95rem; font-weight: 800; }
    .file-list-scroll { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .file-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
    }
    .file-row:hover, .file-row:active { border-color: var(--blue); background: var(--accent); }
    .file-row-icon { font-size: 1.3rem; flex-shrink: 0; }
    .file-row-info { flex: 1; min-width: 0; }
    .file-row-name { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-row-cat { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
    .file-row-arrow { color: var(--text2); font-size: 1rem; }

    .share-job-btn {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      padding: 7px 13px; border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text2);
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .share-job-btn:hover { border-color: var(--green); color: var(--green); }

    /* ── Share modal ── */
    .share-modal-bg {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .share-modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .share-modal h3 { font-size: 1rem; font-weight: 800; }
    .share-modal p  { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }
    .share-link-row { display: flex; gap: 8px; align-items: center; }
    .share-link-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px;
      color: var(--text); font-size: 0.78rem; font-family: monospace; outline: none;
    }
    .share-copy-btn {
      background: var(--blue); color: #0d1117; font-weight: 700;
      border: none; border-radius: 8px; padding: 9px 14px;
      font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
    }
    .share-copy-btn:hover { opacity: 0.85; }
    .share-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .share-del-btn {
      background: transparent; border: 1px solid rgba(219,21,35,0.4);
      color: #ff7070; border-radius: 8px; padding: 8px 14px;
      font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
    }
    .share-del-btn:hover { background: rgba(219,21,35,0.15); }
    .share-close-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); border-radius: 8px; padding: 8px 14px;
      font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
    }
    .share-close-btn:hover { border-color: var(--text); color: var(--text); }

    /* ── Step 3: Page picker ── */
    .page-screen-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .page-hint {
      padding: 10px 16px; font-size: 0.78rem; color: var(--text2);
      text-align: center; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .page-grid { flex: 1; overflow-y: auto; background: #222; display: flex; flex-direction: column; gap: 2px; }
    .page-thumb {
      position: relative; background: white; cursor: pointer;
      width: 100%; user-select: none;
    }
    .page-thumb canvas { display: block; width: 100%; height: auto; }
    .page-thumb img { display: block; width: 100%; height: auto; }
    .page-thumb-label {
      position: sticky; top: 0; left: 0; right: 0; z-index: 10;
      background: rgba(13,17,23,0.85); color: var(--text);
      font-size: 0.72rem; font-weight: 700; padding: 5px 10px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(4px);
    }
    .page-thumb-tap { font-size: 0.68rem; color: var(--blue); font-weight: 600; }
    .page-thumb.double-tapped { outline: 3px solid var(--blue); }
    .loading-pages {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      padding: 40px; color: var(--text2); font-size: 0.85rem;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Compass mode ── */
    .compass-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: none; flex-direction: column;
    }
    .compass-screen.active { display: flex; }

    /* ── Snap preview overlay ── */
    .snap-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.92);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 20px;
    }
    .snap-overlay.open { display: flex; }
    .snap-preview-img {
      max-width: 100%; max-height: calc(100vh - 120px);
      object-fit: contain; border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    .snap-actions {
      display: flex; gap: 10px;
    }
    .snap-action-btn {
      padding: 10px 20px; border-radius: 9px; font-size: 0.82rem;
      font-weight: 700; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .snap-action-btn.share { background: var(--blue); color: #0d1117; }
    .snap-action-btn.close { background: rgba(255,255,255,0.12); color: var(--text); border: 1px solid var(--border); }
    .snap-action-btn:hover { opacity: 0.85; }
    .compass-hud {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 102;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: rgba(13,17,23,0.9); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.1);
      gap: 8px;
    }
    .compass-hud-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .compass-status { font-size: 0.75rem; font-weight: 700; color: var(--blue); }
    .compass-hud-right { display: flex; gap: 5px; flex-wrap: nowrap; }
    .hud-btn {
      padding: 6px 9px; border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08); color: var(--text);
      font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .hud-btn:hover { background: rgba(255,255,255,0.15); }
    .hud-btn.exit { border-color: rgba(219,21,35,0.5); color: #ff6b6b; }
    .hud-btn.lock-btn { border-color: rgba(96,180,240,0.4); color: var(--blue); }
    .hud-btn.lock-btn.locked { background: var(--blue); color: #0d1117; border-color: var(--blue); }
    .hud-btn.exit:hover { background: rgba(219,21,35,0.2); }
    .hud-btn.dot-btn { border-color: rgba(255,140,0,0.5); color: #ff8c00; }
    .hud-btn.dot-btn.active { background: #ff8c00; color: #0d1117; border-color: #ff8c00; }
    .compass-dot {
      position: absolute;
      width: 4px; height: 4px;
      background: rgba(255,100,0,0.55);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20;
    }

    .compass-wrap {
      position: absolute; inset: 0; bottom: 60px;
      display: flex; align-items: center; justify-content: center;
      overflow: visible;
    }
    .compass-content {
      position: absolute;
      width: 200vmax; height: 200vmax;
      top: 50%; left: 50%;
      transform-origin: center center;
      transform: translate(-50%, -50%) rotate(0deg) scale(1);
      will-change: transform;
      display: flex; align-items: center; justify-content: center;
    }
    .compass-image {
      width: 100vw; height: calc(100vh - 60px);
      object-fit: contain; background: #fff;
      display: block;
    }
    .compass-canvas {
      display: block;
      background: #fff;
      width: 100vw;
      height: calc(100vh - 60px);
      object-fit: contain;
    }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: var(--text2); padding: 40px; text-align: center;
    }
    .empty-state svg { width: 40px; height: 40px; stroke: var(--text2); fill: none; stroke-width: 1.5; opacity: 0.5; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }
  </style>
</head>
<body data-template="field_compass.html" data-template="field_compass.html">

<header class="site-header">
  <a class="header-left" href="/" style="text-decoration:none;color:inherit;">
    <img class="logo-img" src="/static/logo.jpg" alt="PEI"/>
    <div class="site-name"><span class="blue">PEI</span><span class="dim">tools.com</span></div>
  </a>
  <a class="back-btn" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    Home
  </a>
</header>

<!-- Step 1: Job picker -->
<div class="screen active" id="screenJob">
  <div class="step-header">🧭 Field Compass — Choose a Job</div>
  <div class="job-grid" id="jobGrid">
    <div class="loading-pages"><div class="spinner"></div><span>Loading jobs…</span></div>
  </div>
</div>

<!-- Step 2: File picker -->
<div class="screen" id="screenFile">
  <div class="file-screen-header">
    <button class="btn-back-step" onclick="goToStep(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Jobs
    </button>
    <span class="screen-title" id="fileScreenTitle">Select a File</span>
    <button class="share-job-btn" id="shareJobBtn" onclick="openShareModal()">🔗 Share Job</button>
  </div>
  <div class="file-list-scroll" id="fileListScroll"></div>
</div>

<!-- Step 3: Page picker -->
<div class="screen" id="screenPage">
  <div class="page-screen-header">
    <button class="btn-back-step" onclick="goToStep(2)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Files
    </button>
    <span class="screen-title" id="pageScreenTitle">Choose a Page</span>
  </div>
  <div class="page-hint">Scroll through the document — <strong>double-tap</strong> any page to open in Compass Mode</div>
  <div class="page-grid" id="pageGrid"></div>
</div>

<!-- Compass mode overlay -->
<div class="compass-screen" id="compassScreen">
  <div class="compass-wrap" id="compassWrap">
    <!-- Rotation pivot fixed at screen center -->
    <div id="compassRotator" style="position:absolute;top:50%;left:50%;transform-origin:0 0;">
      <!-- Pan and scale, centered on the rotator anchor -->
      <div class="compass-content" id="compassContent">
        <!-- Canvas wrapper: pins overlay tracks canvas size exactly -->
        <div id="compassCanvasWrap" style="position:relative;display:inline-block;flex-shrink:0;">
          <canvas class="compass-canvas" id="compassCanvas"></canvas>
          <div id="compassPins" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- Snap preview overlay -->
  <div class="snap-overlay" id="snapOverlay">
    <img class="snap-preview-img" id="snapPreviewImg" src="" alt="Snapshot"/>
    <div class="snap-actions">
      <button class="snap-action-btn share" onclick="shareSnap()">↑ Share</button>
      <button class="snap-action-btn close" onclick="closeSnapOverlay()">✕ Close</button>
    </div>
  </div>

  <div class="compass-hud">
    <div class="compass-hud-right">
      <button class="hud-btn lock-btn" id="lockBtn" onclick="lockCompass()">🔒 Lock</button>
      <button class="hud-btn dot-btn" id="dotBtn" onclick="toggleDotMode()">&#9679; Pin</button>
      <button class="hud-btn" id="undoBtn" onclick="undoPin()" style="opacity:0.4;border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);">&#8592; Undo</button>
      <button class="hud-btn" id="snapBtn" onclick="takeSnap()">📷 Snap</button>
      <button class="hud-btn exit" onclick="exitCompass()">✕ Exit</button>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div id="shareModalBg" class="share-modal-bg" style="display:none;" onclick="if(event.target===this)closeShareModal()">
  <div class="share-modal">
    <h3>🔗 Share Field Compass</h3>
    <p id="shareModalDesc">Generate a link that opens the Field Compass app for this job — no login needed.</p>
    <div id="shareLinkSection" style="display:none;">
      <div class="share-link-row">
        <input class="share-link-input" id="shareLinkInput" readonly/>
        <button class="share-copy-btn" onclick="copyShareLink()">Copy</button>
      </div>
    </div>
    <div class="share-actions">
      <button class="share-del-btn" id="shareDelBtn" style="display:none;" onclick="deleteShareLink()">🗑 Delete Link</button>
      <button class="share-close-btn" onclick="closeShareModal()">Close</button>
      <button class="share-copy-btn" id="shareGenBtn" onclick="generateShareLink()">Generate Link</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──────────────────────────────────────────────────
let currentJob     = null;
let currentFile    = null;
let pdfDoc         = null;
let compassMode    = false;
let lockedAlpha    = null;
let currentAlpha   = 0;
let compassRot     = 0;
let pinchDist0     = null;
let pinchScale0    = 1;
let currentScale   = 1;

// ── Navigation ─────────────────────────────────────────────
function goToStep(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(['', 'screenJob', 'screenFile', 'screenPage'][n]).classList.add('active');
}

// ── Step 1: Load jobs ──────────────────────────────────────
async function loadJobs() {
  const res  = await fetch('/api/jobs');
  if (res.status === 401) { window.location.href = '/login'; return; }
  const jobs = await res.json();
  const grid = document.getElementById('jobGrid');

  if (!jobs.length) {
    grid.innerHTML = '<div class="loading-pages"><p>No jobs yet. Ask your PM to add files via the Admin page.</p></div>';
    return;
  }

  grid.innerHTML = '';
  jobs.forEach(job => {
    const card = document.createElement('div');
    card.className = 'job-card';
    card.innerHTML = `
      <div class="job-card-icon">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      </div>
      <div class="job-card-name">${job}</div>
      <span class="job-card-arrow">›</span>`;
    card.onclick = () => selectJob(job);
    grid.appendChild(card);
  });

  // Size all cards to the width of the widest one
  requestAnimationFrame(() => {
    const cards = grid.querySelectorAll('.job-card');
    let maxW = 0;
    cards.forEach(c => { c.style.width = 'auto'; maxW = Math.max(maxW, c.offsetWidth); });
    cards.forEach(c => c.style.width = maxW + 'px');
  });
}

// ── Step 2: Load files for job ─────────────────────────────
async function selectJob(job) {
  currentJob = job;
  document.getElementById('fileScreenTitle').textContent = job;
  goToStep(2);

  const scroll = document.getElementById('fileListScroll');
  scroll.innerHTML = '<div class="loading-pages"><div class="spinner"></div><span>Loading files…</span></div>';

  const res   = await fetch(`/api/jobs/${encodeURIComponent(job)}/all-files`);
  const allFiles = await res.json();
  const files = allFiles.filter(f => f.category === 'Blueprints');

  scroll.innerHTML = '';

  if (!files.length) {
    scroll.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No files uploaded for this job yet.</p></div>';
    return;
  }

  files.forEach(f => {
    const row = document.createElement('div');
    row.className = 'file-row';
    const icon = f.type === 'pdf' ? '📄' : '🖼️';
    row.innerHTML = `
      <span class="file-row-icon">${icon}</span>
      <div class="file-row-info">
        <div class="file-row-name">${f.name}</div>
      </div>
      <span class="file-row-arrow">›</span>`;
    row.onclick = () => selectFile(f);
    scroll.appendChild(row);
  });
}

// ── Step 3: Page picker ────────────────────────────────────
// Double-tap detection
let lastTapTime = 0;
let lastTapEl   = null;

function handleDoubleTap(el, callback) {
  const now = Date.now();
  if (lastTapEl === el && now - lastTapTime < 350) {
    callback();
    lastTapTime = 0; lastTapEl = null;
  } else {
    lastTapTime = now; lastTapEl = el;
  }
}

async function selectFile(file) {
  currentFile = file;
  document.getElementById('pageScreenTitle').textContent = file.name;
  goToStep(3);

  const grid = document.getElementById('pageGrid');
  grid.innerHTML = '<div class="loading-pages"><div class="spinner"></div><span>Loading…</span></div>';

  if (file.type === 'image') {
    grid.innerHTML = '';
    const thumb = document.createElement('div');
    thumb.className = 'page-thumb';
    const label = document.createElement('div');
    label.className = 'page-thumb-label';
    label.innerHTML = `<span>${file.name}</span><span class="page-thumb-tap">Double-tap to use</span>`;
    const img = document.createElement('img');
    img.src = file.url;
    img.alt = file.name;
    thumb.appendChild(label);
    thumb.appendChild(img);
    thumb.addEventListener('click', () => handleDoubleTap(thumb, () => openCompassImage(file.url)));
    thumb.addEventListener('touchend', (e) => { e.preventDefault(); handleDoubleTap(thumb, () => openCompassImage(file.url)); });
    grid.appendChild(thumb);
    return;
  }

  // PDF — render full-width pages
  try {
    const resp   = await fetch(file.url);
    const buffer = await resp.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;
    grid.innerHTML = '';

    // Scale to fill screen width
    const containerW = grid.clientWidth || window.innerWidth;
    const firstPage  = await pdfDoc.getPage(1);
    const baseVP     = firstPage.getViewport({ scale: 1 });
    const scale      = containerW / baseVP.width;

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page   = await pdfDoc.getPage(i);
      const vp     = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width  = vp.width;
      canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

      const thumb = document.createElement('div');
      thumb.className = 'page-thumb';
      const label = document.createElement('div');
      label.className = 'page-thumb-label';
      label.innerHTML = `<span>Page ${i} of ${pdfDoc.numPages}</span><span class="page-thumb-tap">Double-tap to use</span>`;
      thumb.appendChild(label);
      thumb.appendChild(canvas);

      thumb.addEventListener('click',    ()  => handleDoubleTap(thumb, () => openCompassFromCanvas(canvas)));
      thumb.addEventListener('touchend', (e) => { e.preventDefault(); handleDoubleTap(thumb, () => openCompassFromCanvas(canvas)); });
      grid.appendChild(thumb);
    }
  } catch(e) {
    grid.innerHTML = `<div class="loading-pages"><p>Could not load PDF: ${e.message}</p></div>`;
  }
}

// ── Open in compass ────────────────────────────────────────
// ── Render at max safe scale for device ────────────────────
// Returns {scale, cssW, cssH, bufW, bufH}
// Canvas buffer = physical pixels (1:1 with screen), CSS size = CSS pixels
// Browser does zero scaling → maximum sharpness
function getSharpRenderParams(pageW, pageH) {
  const isAndroid = /android/i.test(navigator.userAgent);

  if (isAndroid) {
    // Android: original safe approach — no DPR, strict limits to prevent crashes
    const MAX_PIXELS = 3_000_000;
    const MAX_DIM    = 2048;
    const screenW    = window.innerWidth;
    let scale = screenW / pageW;
    if (pageW * scale * pageH * scale > MAX_PIXELS)
      scale = Math.sqrt(MAX_PIXELS / (pageW * pageH));
    if (pageW * scale > MAX_DIM) scale = MAX_DIM / pageW;
    if (pageH * scale > MAX_DIM) scale = MAX_DIM / pageH;
    scale = Math.max(scale, 0.3);
    const bufW = Math.round(pageW * scale);
    const bufH = Math.round(pageH * scale);
    return { scale, cssW: bufW, cssH: bufH, bufW, bufH, dpr: 1 };
  }

  // iOS: use DPR for retina sharpness, capped at safe limits
  const dpr        = Math.min(window.devicePixelRatio || 1, 2);
  const MAX_PIXELS = 12_000_000;
  const MAX_DIM    = 4096;
  const dispW      = window.innerWidth;
  const dispH      = window.innerHeight - 60;
  let scale = Math.min(dispW * dpr / pageW, dispH * dpr / pageH);
  if (pageW * scale * pageH * scale > MAX_PIXELS)
    scale = Math.sqrt(MAX_PIXELS / (pageW * pageH));
  if (pageW * scale > MAX_DIM) scale = MAX_DIM / pageW;
  if (pageH * scale > MAX_DIM) scale = MAX_DIM / pageH;
  scale = Math.max(scale, 0.3);
  const bufW = Math.round(pageW * scale);
  const bufH = Math.round(pageH * scale);
  return { scale, cssW: bufW / dpr, cssH: bufH / dpr, bufW, bufH, dpr };
}

function getSafeRenderScale(pageW, pageH) {
  return getSharpRenderParams(pageW, pageH).scale;
}

async function openCompassFromCanvas(thumbnailCanvas) {
  const granted = await requestOrientationPermission();
  if (!granted) return;

  document.getElementById('compassScreen').classList.add('active');

  const compassCanvas = document.getElementById('compassCanvas');

  // Try to re-render at higher quality within iOS limits
  if (pdfDoc && currentFile) {
    try {
      const pageEl   = thumbnailCanvas.closest('.page-thumb');
      const pageNum  = pageEl ? Array.from(pageEl.parentNode.children).indexOf(pageEl) + 1 : 1;
      compassPageNum = pageNum;
      const page     = await pdfDoc.getPage(pageNum);
      const baseVP   = page.getViewport({ scale: 1 });
      basePageW = baseVP.width; basePageH = baseVP.height;
      const p        = getSharpRenderParams(baseVP.width, baseVP.height);
      const vp       = page.getViewport({ scale: p.scale });
      compassCanvas.width  = p.bufW;
      compassCanvas.height = p.bufH;
      // iOS only: set exact CSS size so browser does zero scaling (pixel-perfect)
      // Android: leave CSS to object-fit:contain to avoid crash/distortion
      // Always set explicit CSS so re-renders stay sharp on both iOS and Android.
      // object-fit:contain is unreliable for canvas buffer-only updates.
      compassCanvas.style.width  = p.cssW + 'px';
      compassCanvas.style.height = p.cssH + 'px';
      await page.render({ canvasContext: compassCanvas.getContext('2d'), viewport: vp }).promise;
    } catch(e) {
      compassPageNum = null;
      compassCanvas.width  = thumbnailCanvas.width;
      compassCanvas.height = thumbnailCanvas.height;
      compassCanvas.getContext('2d').drawImage(thumbnailCanvas, 0, 0);
    }
  } else {
    compassPageNum = null;
    compassCanvas.width  = thumbnailCanvas.width;
    compassCanvas.height = thumbnailCanvas.height;
    compassCanvas.getContext('2d').drawImage(thumbnailCanvas, 0, 0);
  }

  startCompass();
}

function openCompassImage(url) {
  requestOrientationPermission().then(granted => {
    if (!granted) return;
    document.getElementById('compassScreen').classList.add('active');
      const compassCanvas = document.getElementById('compassCanvas');
    const img = new Image();
    img.onload = () => {
      compassCanvas.width  = img.naturalWidth;
      compassCanvas.height = img.naturalHeight;
      compassCanvas.getContext('2d').drawImage(img, 0, 0);
      startCompass();
    };
    img.src = url;
  });
}

// Request iOS 13+ permission. Returns true if granted or not required.
async function requestOrientationPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') {
        alert('Compass access denied. Go to Settings → Safari → Motion & Orientation Access and turn it on.');
        return false;
      }
    } catch(e) {
      alert('Could not get compass permission: ' + e.message);
      return false;
    }
  }
  return true;
}

// ── Compass state ──────────────────────────────────────────
let panX = 0, panY = 0;
let panStartX = 0, panStartY = 0, panBaseX = 0, panBaseY = 0;
let isPanning    = false;
let rafPending   = false;       // throttle orientation → RAF
let compassPageNum = null;      // track current page for re-render on zoom
let basePageW = 0, basePageH = 0; // original page dimensions for re-render
let reRenderTimer = null;
let lastRenderedScale = 1;      // scale at which canvas was last rendered

function startCompass() {
  lockedAlpha       = null;
  currentScale      = 1;
  lastRenderedScale = 1;
  compassRot        = 0;
  panX = 0; panY = 0;
  rafPending        = false;
  applyTransform();

  document.getElementById('compassScreen').classList.add('active');
  document.getElementById('lockBtn').textContent = '🔒 Lock';
  document.getElementById('lockBtn').classList.remove('locked');

  window.addEventListener('deviceorientation', onOrientation, true);

  const wrap = document.getElementById('compassWrap');
  wrap.addEventListener('touchstart',  onTouchStart, { passive: false });
  wrap.addEventListener('touchmove',   onTouchMove,  { passive: false });
  wrap.addEventListener('touchend',    onTouchEnd,   { passive: false });
}

function exitCompass() {
  dotMode = false;
  closeSnapOverlay();
  document.getElementById('dotBtn').classList.remove('active');
  clearDots();
  document.getElementById('compassScreen').classList.remove('active');
  window.removeEventListener('deviceorientation', onOrientation, true);
  const wrap = document.getElementById('compassWrap');
  wrap.removeEventListener('touchstart', onTouchStart);
  wrap.removeEventListener('touchmove',  onTouchMove);
  wrap.removeEventListener('touchend',   onTouchEnd);

  // Free canvas memory
  const c = document.getElementById('compassCanvas');
  c.width = 1; c.height = 1;
  if (reRenderTimer) { clearTimeout(reRenderTimer); reRenderTimer = null; }
}

// Throttle orientation events via RAF — prevents Android crash from 100Hz DOM writes
function onOrientation(e) {
  if (e.alpha === null || e.alpha === undefined) return;
  currentAlpha = e.alpha;
  if (lockedAlpha === null) return;
  let delta = currentAlpha - lockedAlpha;
  if (delta >  180) delta -= 360;
  if (delta < -180) delta += 360;
  compassRot = delta;
  if (!rafPending) {
    rafPending = true;
    requestAnimationFrame(() => { applyTransform(); rafPending = false; });
  }
}

// ── Pin / dot mode ─────────────────────────────────────────
let dotMode    = false;
let pinHistory = [];

function toggleDotMode() {
  dotMode = !dotMode;
  document.getElementById('dotBtn').classList.toggle('active', dotMode);
}

function undoPin() {
  if (!pinHistory.length) return;
  pinHistory.pop().remove();
  document.getElementById('undoBtn').style.opacity = pinHistory.length ? '1' : '0.4';
}

function placeDot(touchX, touchY) {
  // Pivot = center of compassWrap in screen coords
  const wrap = document.getElementById('compassWrap');
  const wr   = wrap.getBoundingClientRect();
  const pivX = wr.left + wr.width  / 2;
  const pivY = wr.top  + wr.height / 2;

  // Undo compassRotator rotation around pivot
  const angle = -compassRot * Math.PI / 180;
  const dx = touchX - pivX;
  const dy = touchY - pivY;
  const nx = dx * Math.cos(angle) - dy * Math.sin(angle);
  const ny = dx * Math.sin(angle) + dy * Math.cos(angle);

  // Undo compassContent translate + scale (canvas is CSS-centered in content)
  // Forward: rotX = (p.x - cW/2) * scale + panX  where cW = canvas.offsetWidth
  // Inverse: p.x = (rotX - panX) / scale + cW/2
  const canvas = document.getElementById('compassCanvas');
  const cW = canvas.offsetWidth;
  const cH = canvas.offsetHeight;
  const px = (nx - panX) / currentScale + cW / 2;
  const py = (ny - panY) / currentScale + cH / 2;

  // Place in compassPins which perfectly overlays the canvas
  // % is relative to canvas size so pin stays fixed to document at any zoom
  const dot = document.createElement('div');
  dot.className = 'compass-dot';
  dot.style.left = (px / cW * 100) + '%';
  dot.style.top  = (py / cH * 100) + '%';
  document.getElementById('compassPins').appendChild(dot);

  pinHistory.push(dot);
  document.getElementById('undoBtn').style.opacity = '1';
  dotMode = false;
  document.getElementById('dotBtn').classList.remove('active');
}

function clearDots() {
  const pins = document.getElementById('compassPins');
  if (pins) pins.innerHTML = '';
  pinHistory = [];
  const ub = document.getElementById('undoBtn');
  if (ub) ub.style.opacity = '0.4';
}

let snapDataUrl = null;
let snapFileName = '';

function getSnapCanvas() {
  const src = document.getElementById('compassCanvas');
  const out = document.createElement('canvas');
  out.width  = src.width;
  out.height = src.height;
  const ctx = out.getContext('2d');

  // Draw the PDF page
  ctx.drawImage(src, 0, 0);

  // Draw pins onto the buffer — positions are percentages of canvas dimensions
  const pins = document.querySelectorAll('#compassPins .compass-dot');
  if (pins.length) {
    const cssW = parseFloat(src.style.width)  || src.width;
    const cssH = parseFloat(src.style.height) || src.height;
    // Scale pin radius from CSS px to buffer px
    const pinRadiusBuf = Math.max(3, 2 * (src.width / cssW));
    ctx.fillStyle = 'rgba(255,100,0,0.7)';
    pins.forEach(pin => {
      const pctX = parseFloat(pin.style.left);
      const pctY = parseFloat(pin.style.top);
      if (isNaN(pctX) || isNaN(pctY)) return;
      const bx = (pctX / 100) * src.width;
      const by = (pctY / 100) * src.height;
      ctx.beginPath();
      ctx.arc(bx, by, pinRadiusBuf, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  return out;
}

async function takeSnap() {
  snapFileName = (currentFile ? currentFile.name.replace(/\.pdf$/i, '') : 'blueprint') + '_snapshot.png';
  const snapCanvas = getSnapCanvas();
  snapDataUrl = snapCanvas.toDataURL('image/png');

  // Auto-download (saves to phone Downloads / Files)
  const a = document.createElement('a');
  a.download = snapFileName;
  a.href = snapDataUrl;
  a.click();

  // Show preview overlay
  document.getElementById('snapPreviewImg').src = snapDataUrl;
  document.getElementById('snapOverlay').classList.add('open');
}

async function shareSnap() {
  if (!snapDataUrl) return;
  try {
    const res  = await fetch(snapDataUrl);
    const blob = await res.blob();
    const file = new File([blob], snapFileName, { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Blueprint Snapshot' });
      return;
    }
  } catch(e) { /* cancelled or unsupported */ }
  // Fallback: re-trigger download
  const a = document.createElement('a');
  a.download = snapFileName;
  a.href = snapDataUrl;
  a.click();
}

function closeSnapOverlay() {
  document.getElementById('snapOverlay').classList.remove('open');
  snapDataUrl = null;
  document.getElementById('snapPreviewImg').src = '';
}

function lockCompass() {
  if (lockedAlpha === null) {
    lockedAlpha = currentAlpha;
    document.getElementById('lockBtn').textContent = '🔓 Unlock';
    document.getElementById('lockBtn').classList.add('locked');
  } else {
    lockedAlpha = null;
      document.getElementById('lockBtn').textContent = '🔒 Lock';
    document.getElementById('lockBtn').classList.remove('locked');
  }
}

function applyTransform() {
  // Rotation always around screen center (compassRotator anchored at 50%,50%)
  document.getElementById('compassRotator').style.transform =
    `rotate(${compassRot}deg)`;
  // Pan and scale applied separately — pan is in screen coordinates
  document.getElementById('compassContent').style.transform =
    `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${currentScale})`;
}

// Re-render canvas at higher res after zoom settles
async function reRenderAtZoom() {
  if (!pdfDoc || !compassPageNum || basePageW === 0) return;
  const isAndroid  = /android/i.test(navigator.userAgent);
  const dpr        = isAndroid ? 1 : Math.min(window.devicePixelRatio || 1, 2);
  const MAX_PIXELS = isAndroid ? 3_000_000  : 12_000_000;
  const MAX_DIM    = isAndroid ? 2048 : 4096;
  try {
    const page   = await pdfDoc.getPage(compassPageNum);
    const baseVP = page.getViewport({ scale: 1 });
    let targetScale = (window.innerWidth * dpr * Math.min(currentScale, 4)) / baseVP.width;
    if (baseVP.width * targetScale * baseVP.height * targetScale > MAX_PIXELS)
      targetScale = Math.sqrt(MAX_PIXELS / (baseVP.width * baseVP.height));
    if (baseVP.width  * targetScale > MAX_DIM) targetScale = MAX_DIM / baseVP.width;
    if (baseVP.height * targetScale > MAX_DIM) targetScale = MAX_DIM / baseVP.height;
    targetScale = Math.max(targetScale, 0.3);

    // Render into offscreen canvas first — main canvas never goes blank
    const vp = page.getViewport({ scale: targetScale });
    const offscreen = document.createElement('canvas');
    offscreen.width  = vp.width;
    offscreen.height = vp.height;
    await page.render({ canvasContext: offscreen.getContext('2d'), viewport: vp }).promise;

    // Swap into main canvas in one synchronous step — no flash
    const canvas = document.getElementById('compassCanvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    canvas.getContext('2d').drawImage(offscreen, 0, 0);
    lastRenderedScale = currentScale;
  } catch(e) { /* silently ignore re-render failures */ }
}

// ── Touch: pinch zoom + pan ────────────────────────────────
function dist(e) {
  return Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
}

function onTouchStart(e) {
  e.preventDefault();
  // Cancel any pending re-render so zoom doesn't reset mid-gesture
  if (reRenderTimer) { clearTimeout(reRenderTimer); reRenderTimer = null; }
  if (e.touches.length === 2) {
    isPanning = false;
    pinchDist0 = dist(e); pinchScale0 = currentScale;
  } else if (e.touches.length === 1) {
    isPanning = true;
    panStartX = e.touches[0].clientX;
    panStartY = e.touches[0].clientY;
    panBaseX  = panX;
    panBaseY  = panY;
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 2 && pinchDist0 !== null) {
    isPanning = false;
    currentScale = Math.min(8, Math.max(0.3, pinchScale0 * dist(e) / pinchDist0));
    applyTransform();
  } else if (e.touches.length === 1 && isPanning) {
    panX = panBaseX + (e.touches[0].clientX - panStartX);
    panY = panBaseY + (e.touches[0].clientY - panStartY);
    applyTransform();
  }
}

function onTouchEnd(e) {
  if (e.touches.length < 2) {
    const wasZooming = pinchDist0 !== null;
    pinchDist0 = null;
    // Re-render only when a pinch-zoom gesture just ended AND scale changed meaningfully
    const scaleRatio = currentScale / lastRenderedScale;
    if (wasZooming && pdfDoc && compassPageNum && (scaleRatio > 1.2 || scaleRatio < 0.8)) {
      if (reRenderTimer) clearTimeout(reRenderTimer);
      reRenderTimer = setTimeout(reRenderAtZoom, 600);
    }
  }
  if (e.touches.length === 0) {
    isPanning = false;
    // Place dot on single tap if dot mode is active
    if (dotMode && e.changedTouches.length === 1) {
      const t = e.changedTouches[0];
      placeDot(t.clientX, t.clientY);
    }
  }
}

// ── Share Compass Link ────────────────────────────────────
async function openShareModal() {
  document.getElementById('shareModalBg').style.display = 'flex';
  document.getElementById('shareLinkSection').style.display = 'none';
  document.getElementById('shareDelBtn').style.display = 'none';
  document.getElementById('shareGenBtn').style.display = 'inline-block';
  document.getElementById('shareGenBtn').textContent = 'Generate Link';
  document.getElementById('shareModalDesc').textContent = 'Checking for existing link…';

  const res  = await fetch('/api/compass-share/info', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({job: currentJob})
  });
  const data = await res.json();
  if (data.token) {
    showShareLink(data.token);
  } else {
    document.getElementById('shareModalDesc').textContent = 'Generate a link that opens the Field Compass app for this job — no login needed.';
  }
}

function showShareLink(token) {
  const url = `${location.origin}/compass/${token}`;
  document.getElementById('shareLinkInput').value = url;
  document.getElementById('shareLinkSection').style.display = 'flex';
  document.getElementById('shareDelBtn').style.display = 'inline-flex';
  document.getElementById('shareGenBtn').style.display = 'none';
  document.getElementById('shareModalDesc').textContent = 'Anyone with this link can open the Field Compass app for this job — no login needed.';
}

async function generateShareLink() {
  const res  = await fetch('/api/compass-share', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({job: currentJob})
  });
  const data = await res.json();
  if (data.token) showShareLink(data.token);
}

async function deleteShareLink() {
  const token = new URL(document.getElementById('shareLinkInput').value).pathname.split('/').pop();
  await fetch('/api/compass-share/delete', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({token})
  });
  document.getElementById('shareLinkSection').style.display = 'none';
  document.getElementById('shareDelBtn').style.display = 'none';
  document.getElementById('shareGenBtn').style.display = 'inline-block';
  document.getElementById('shareGenBtn').textContent = 'Generate Link';
  document.getElementById('shareModalDesc').textContent = 'Link deleted. Generate a new one anytime.';
}

function copyShareLink() {
  navigator.clipboard.writeText(document.getElementById('shareLinkInput').value).then(() => {
    const btn = document.querySelector('.share-copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function closeShareModal() {
  document.getElementById('shareModalBg').style.display = 'none';
}
