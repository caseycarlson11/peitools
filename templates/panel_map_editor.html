<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Editor — {{ job_name }}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{ --blue:#60b4f0; --green:#3fb950; --red:#f85149; --bg:#0d1117;
           --surface:#161b22; --border:#30363d; --text:#e6edf3; --text2:#8b949e; }
    body{ font-family:'Inter',system-ui,sans-serif; background:#525659; color:var(--text);
          height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    .ed-head{ display:flex; align-items:center; gap:12px; flex-wrap:wrap;
              padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); }
    .ed-head a.home{ color:var(--text2); text-decoration:none; font-weight:600; font-size:.85rem; }
    .ed-head a.home:hover{ color:var(--text); }
    .ed-title{ font-weight:700; font-size:.95rem; }
    .ed-title span{ color:var(--text2); font-weight:400; margin-left:6px; }
    .ed-head .sp{ flex:1; }
    .ed-hint{ color:var(--text2); font-size:.78rem; width:100%; }
    .btn{ display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px;
          border:1px solid var(--border); background:var(--surface); color:var(--text);
          font:inherit; font-size:.85rem; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn:hover{ border-color:var(--blue); }
    .btn-green{ background:var(--green); border-color:var(--green); color:#06210f; }
    .btn-green.dirty{ animation:pulse 1.4s infinite; }
    .btn-blue{ background:var(--blue); border-color:var(--blue); color:#06210f; }
    .btn.active{ background:var(--blue); border-color:var(--blue); color:#06210f; }
    .btn:disabled{ opacity:.45; cursor:not-allowed; }
    @keyframes pulse{ 0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.5);} 50%{box-shadow:0 0 0 6px rgba(63,185,80,0);} }
    .zoom{ display:flex; align-items:center; gap:6px; color:var(--text2); font-size:.8rem; }
    .zoom input{ width:120px; accent-color:var(--blue); }

    .ed-body{ flex:1; overflow:auto; overscroll-behavior:contain; padding:20px 0; }
    .ed-body.hand{ cursor:grab; }
    .ed-body.hand.grabbing{ cursor:grabbing; }
    .ed-body.hand .ovl{ pointer-events:none; }   /* drag over boxes without selecting */
    .ed-page{ position:relative; margin:0 auto 18px; width:var(--pw,1000px);
              background:#fff; box-shadow:0 4px 18px rgba(0,0,0,.45); }
    .ed-page canvas{ display:block; width:100%; height:auto; }
    .ovl{ position:absolute; inset:0; }
    .ovl.adding{ cursor:crosshair; }
    .pbox{ position:absolute; border:1.6px solid var(--red); background:rgba(248,81,73,.18);
           border-radius:2px; cursor:pointer; }
    .pbox:hover{ background:rgba(248,81,73,.32); }
    .pbox.sel{ border-color:var(--blue); background:rgba(96,180,240,.35); box-shadow:0 0 0 2px var(--blue); }
    .plabel{ position:absolute; bottom:100%; right:100%; white-space:nowrap;
             background:#fff; color:var(--red); border:1px solid var(--red); border-radius:2px;
             font-size:var(--lblpx,7px); font-weight:800; padding:0 1px; line-height:1.25;
             transform:translate(1px,1px); }

    .ed-actionbar{ position:fixed; left:50%; transform:translateX(-50%); bottom:18px;
                   display:none; align-items:center; gap:10px; z-index:50;
                   background:var(--surface); border:1px solid var(--border); border-radius:10px;
                   padding:10px 14px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
    .ed-actionbar.show{ display:flex; }
    .ed-actionbar .lbl{ font-weight:700; }
    .ed-banner{ display:none; background:var(--green); color:#06210f; font-weight:700;
                font-size:.85rem; text-align:center; padding:8px 12px; }
    .ed-banner.show{ display:block; }
    .toast{ position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:60;
            background:var(--surface); border:1px solid var(--border); border-radius:8px;
            padding:8px 16px; font-size:.85rem; display:none; }
    .toast.show{ display:block; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="ed-head">
    <a class="home" href="/panel-print-mapper">‹ Panel Print Mapper</a>
    <div class="ed-title">Panel Editor <span id="bpName"></span></div>
    <div class="sp"></div>
    <button class="btn" id="addBtn" onclick="toggleAdd()">➕ Add Missing Panel</button>
    <button class="btn" id="seriesBtn" onclick="toggleSeries()" title="Place consecutive panels with one click each">🔢 Add Panel Series</button>
    <button class="btn" id="handBtn" onclick="toggleHand()" title="Hand tool — drag the document">✋ Hand</button>
    <div class="zoom">Size <input type="range" id="zoom" min="600" max="5000" step="50" value="1000" oninput="setZoom(this.value)"></div>
    <button class="btn" id="undoBtn" onclick="undo()" disabled>↶ Undo</button>
    <button class="btn btn-green" id="saveBtn" onclick="saveChanges()" disabled>💾 Save Changes</button>
    <a class="btn" id="dlMarkedBtn" href="#" target="_blank" title="Only the marked-up pages">⬇ Marked Pages</a>
    <a class="btn" id="dlFullBtn" href="#" target="_blank" title="Whole blueprint with edits merged in">⬇ Full Document</a>
    <div class="ed-hint" id="hint">Click a panel to rename or delete it. Click “Add Panel”, then click on a sheet to add a missing one.</div>
  </div>

  <div class="ed-banner" id="addBanner">📍 Click on the print where the panel belongs, then type its number. Click “Add Missing Panel” again to stop.</div>
  <div class="ed-banner" id="seriesBanner"></div>
  <div class="ed-body" id="body"><div style="padding:40px;text-align:center;color:#ccc">Loading…</div></div>

  <div class="ed-actionbar" id="actionBar">
    <span class="lbl" id="selLabel">Panel</span>
    <button class="btn btn-blue" onclick="renameSelected()">✎ Change #</button>
    <button class="btn" id="moveBtn" onclick="armMove()">✥ Move</button>
    <button class="btn" id="resizeBtn" onclick="armResize()">⤡ Resize</button>
    <button class="btn" onclick="deleteSelected()">🗑 Delete</button>
    <button class="btn" onclick="clearSel()">Done</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
const JOB = {{ job_name|tojson }};
const $ = id => document.getElementById(id);
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let dims   = [];            // [{w,h}] per page
let locs   = {};            // panel -> {page, bbox}  (working copy)
let dirty  = false;
let addMode = false;
let selPanel = null;
let seriesMode = false;     // "Add Panel Series" active
let seriesNext = null;      // next number to drop in the series
let selBoxEl   = null;      // the box element of the selected panel (for popup placement)
let armedMode  = null;      // 'move' | 'resize' | null
let undoStack  = [];        // JSON snapshots of locs for Undo
let savedSnapshot = '{}';   // locs at last load/save (to compute dirty)
let curBp      = '';        // blueprint filename (for download URLs)

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'), 2200); }

function setDirty(v){
  dirty = v;
  const b=$('saveBtn'); b.disabled=!v; b.classList.toggle('dirty', v);
  b.textContent = v ? '💾 Save Changes *' : '💾 Save Changes';
}
function recomputeDirty(){ setDirty(JSON.stringify(locs) !== savedSnapshot); }

function pushUndo(){
  undoStack.push(JSON.stringify(locs));
  if(undoStack.length > 60) undoStack.shift();
  updateUndoBtn();
}
function updateUndoBtn(){ const b=$('undoBtn'); if(b) b.disabled = undoStack.length===0; }
function undo(){
  if(!undoStack.length) return;
  locs = JSON.parse(undoStack.pop());
  clearSel(); drawBoxes(); recomputeDirty(); updateUndoBtn();
  toast('Undid last change.');
}

function setZoom(v){ document.documentElement.style.setProperty('--pw', v+'px'); scheduleRerender(); }

async function load(){
  let data;
  try{
    const r = await fetch('/api/panel-map/editor-data/'+encodeURIComponent(JOB));
    data = await r.json();
    if(data.error){ $('body').innerHTML='<div style="padding:40px;text-align:center">'+data.error+'</div>'; return; }
  }catch(e){ $('body').innerHTML='<div style="padding:40px;text-align:center">Could not load.</div>'; return; }

  dims = data.pages || [];
  locs = data.panel_locations || {};
  savedSnapshot = JSON.stringify(locs); undoStack = []; updateUndoBtn();
  curBp = data.blueprint || '';
  $('bpName').textContent = curBp;
  refreshDownloadLinks();

  pdfDoc = await pdfjsLib.getDocument('/api/panel-map/base/'+encodeURIComponent(JOB)).promise;
  buildPages();
}

const DPR = Math.min(window.devicePixelRatio || 1, 2);   // crispness multiplier
const RENDER_CAP = 4200;   // max canvas width (px) to bound memory
let obs = null;
const renderJobs = {};     // pi -> in-flight render token

function pageCssWidth(){
  const pg = document.querySelector('.ed-page');
  return pg ? pg.clientWidth : 1000;
}

function buildPages(){
  const body = $('body'); body.innerHTML='';
  if(obs) obs.disconnect();
  obs = new IntersectionObserver((ents)=>{
    ents.forEach(en=>{ if(en.isIntersecting){ const c=en.target.querySelector('canvas');
      renderPageCanvas(parseInt(en.target.dataset.pi,10), c); } });
  }, {root: body, rootMargin:'800px 0px'});

  for(let pi=0; pi<dims.length; pi++){
    const wrap = document.createElement('div');
    wrap.className='ed-page'; wrap.dataset.pi=pi;
    const d = dims[pi];
    wrap.style.aspectRatio = (d.w && d.h) ? (d.w+' / '+d.h) : 'auto';
    const ovl = document.createElement('div'); ovl.className='ovl'; ovl.dataset.pi=pi;
    ovl.addEventListener('click', (e)=>onOverlayClick(e, pi));
    wrap.innerHTML = '<canvas></canvas>';
    wrap.appendChild(ovl);
    body.appendChild(wrap);
    obs.observe(wrap);
  }
  updateLabelScale();
  drawBoxes();
}

// Rasterize a page at the CURRENT on-screen size × device pixel ratio, so it
// stays sharp at any zoom — the same approach the native PDF viewer uses.
async function renderPageCanvas(pi, canvas){
  const base = dims[pi];
  const targetW = Math.min(Math.round(pageCssWidth() * DPR), RENDER_CAP);
  if(canvas.dataset.w && Math.abs((+canvas.dataset.w) - targetW) < 32) return;  // already sharp enough
  const token = (renderJobs[pi] = (renderJobs[pi]||0) + 1);
  const page = await pdfDoc.getPage(pi+1);
  if(token !== renderJobs[pi]) return;   // superseded by a newer zoom
  const vp = page.getViewport({scale: targetW / (base.w || page.getViewport({scale:1}).width)});
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
  canvas.dataset.w = targetW;
}

// Number labels are sized in screen px; scale them to the current zoom so they
// look like the small chips on the PDF (≈7 PDF-points) instead of fixed 10px.
function updateLabelScale(){
  if(!dims[0]) return;
  const scale = pageCssWidth() / (dims[0].w || 1000);   // px per PDF point
  const px = Math.max(3, Math.min(16, 7 * scale));
  document.documentElement.style.setProperty('--lblpx', px + 'px');
}

// After a zoom change, re-rasterize the visible pages crisply (debounced).
let zoomTimer = null;
function scheduleRerender(){
  updateLabelScale();
  positionActionBar();
  clearTimeout(zoomTimer);
  zoomTimer = setTimeout(()=>{
    document.querySelectorAll('.ed-page').forEach(wrap=>{
      const r = wrap.getBoundingClientRect();
      if(r.bottom > -400 && r.top < window.innerHeight + 400){
        renderPageCanvas(parseInt(wrap.dataset.pi,10), wrap.querySelector('canvas'));
      }
    });
  }, 200);
}

function ovlOf(pi){ return document.querySelector('.ovl[data-pi="'+pi+'"]'); }

function setBoxRect(box, bbox, d){
  const [x0,y0,x1,y1] = bbox; const pad=2;
  box.style.left   = ((x0-pad)/d.w*100)+'%';
  box.style.top    = ((y0-pad)/d.h*100)+'%';
  box.style.width  = ((x1-x0+pad*2)/d.w*100)+'%';
  box.style.height = ((y1-y0+pad*2)/d.h*100)+'%';
}

function drawBoxes(){
  document.querySelectorAll('.ovl').forEach(o=>o.querySelectorAll('.pbox').forEach(b=>b.remove()));
  for(const panel in locs){
    const loc = locs[panel]; const d = dims[loc.page]; const ovl = ovlOf(loc.page);
    if(!d || !ovl) continue;
    const box = document.createElement('div');
    box.className='pbox' + (panel===selPanel ? ' sel' : '');
    box.dataset.panel = panel;
    setBoxRect(box, loc.bbox, d);
    const lab = document.createElement('div'); lab.className='plabel'; lab.textContent=panel;
    box.appendChild(lab);
    box.onclick = (e)=>{ if(addMode || seriesMode) return; e.stopPropagation(); selectPanel(panel, box); };
    box.addEventListener('pointerdown', (e)=>onBoxPointerDown(e, panel, box));
    ovl.appendChild(box);
  }
}

// Drag to move or resize the selected highlight (armed via the Move/Resize buttons).
function onBoxPointerDown(e, panel, box){
  if((armedMode!=='move' && armedMode!=='resize') || panel!==selPanel) return;
  e.preventDefault(); e.stopPropagation();
  const pi = locs[panel].page, d = dims[pi];
  const ovlRect = ovlOf(pi).getBoundingClientRect();
  const sx = e.clientX, sy = e.clientY, orig = locs[panel].bbox.slice(), mode = armedMode;
  let nb = orig.slice(), moved = false;
  try{ box.setPointerCapture(e.pointerId); }catch(_){}
  const mv = (ev)=>{
    moved = true;
    const dxp = (ev.clientX-sx)/ovlRect.width*d.w, dyp = (ev.clientY-sy)/ovlRect.height*d.h;
    if(mode==='move') nb = [orig[0]+dxp, orig[1]+dyp, orig[2]+dxp, orig[3]+dyp];
    else nb = [orig[0], orig[1], Math.max(orig[0]+3, orig[2]+dxp), Math.max(orig[1]+3, orig[3]+dyp)];
    setBoxRect(box, nb, d);
  };
  const up = ()=>{
    box.removeEventListener('pointermove', mv);
    box.removeEventListener('pointerup', up);
    box.removeEventListener('pointercancel', up);
    if(moved){ pushUndo(); locs[panel].bbox = nb; recomputeDirty(); drawBoxes(); selectPanel(panel); }
  };
  box.addEventListener('pointermove', mv);
  box.addEventListener('pointerup', up);
  box.addEventListener('pointercancel', up);
}

function armMove(){   if(selPanel==null) return; armedMode = (armedMode==='move')   ? null : 'move';
  toast(armedMode==='move'   ? 'Drag the panel to move it.'   : ''); updateManipUI(); }
function armResize(){ if(selPanel==null) return; armedMode = (armedMode==='resize') ? null : 'resize';
  toast(armedMode==='resize' ? 'Drag the panel to resize it.' : ''); updateManipUI(); }

function updateManipUI(){
  const mb=$('moveBtn'), rb=$('resizeBtn');
  if(mb) mb.classList.toggle('active', armedMode==='move');
  if(rb) rb.classList.toggle('active', armedMode==='resize');
  if(selBoxEl) selBoxEl.style.cursor = armedMode==='move' ? 'move'
                                     : armedMode==='resize' ? 'nwse-resize' : 'pointer';
}

function selectPanel(panel, boxEl){
  if(panel !== selPanel) armedMode = null;
  selPanel = panel;
  selBoxEl = boxEl || document.querySelector('.pbox[data-panel="'+CSS.escape(panel)+'"]');
  document.querySelectorAll('.pbox').forEach(b=>b.classList.toggle('sel', b.dataset.panel===panel));
  $('selLabel').textContent = 'Panel ' + panel;
  $('actionBar').classList.add('show');
  updateManipUI();
  positionActionBar();
}

// Float the Delete / Change# popup next to the clicked panel.
function positionActionBar(){
  const bar = $('actionBar'); if(!selBoxEl || !bar.classList.contains('show')) return;
  const r = selBoxEl.getBoundingClientRect();
  const bw = bar.offsetWidth || 300, bh = bar.offsetHeight || 46;
  let left = r.left + r.width/2 - bw/2;
  let top  = r.bottom + 8;
  if(top + bh > window.innerHeight - 8) top = r.top - bh - 8;   // flip above if no room below
  left = Math.max(8, Math.min(window.innerWidth - bw - 8, left));
  top  = Math.max(8, top);
  bar.style.left = left + 'px';
  bar.style.top = top + 'px';
  bar.style.bottom = 'auto';
  bar.style.transform = 'none';
}

function clearSel(){ selPanel=null; selBoxEl=null; armedMode=null;
  document.querySelectorAll('.pbox.sel').forEach(b=>b.classList.remove('sel'));
  $('actionBar').classList.remove('show'); updateManipUI(); }

function renameSelected(){
  if(selPanel==null) return;
  const v = prompt('New panel number for "'+selPanel+'":', selPanel);
  if(v==null) return;
  const nn = String(v).trim();
  if(!nn || nn===selPanel) return;
  if(locs[nn] && !confirm('Panel "'+nn+'" already exists — overwrite it?')) return;
  pushUndo();
  locs[nn] = locs[selPanel]; delete locs[selPanel];
  selPanel = nn; setDirty(true); drawBoxes(); selectPanel(nn);
}

function deleteSelected(){
  if(selPanel==null) return;
  pushUndo();
  delete locs[selPanel]; setDirty(true); clearSel(); drawBoxes();
}

function toggleAdd(){
  addMode = !addMode;
  if(addMode && handMode) toggleHand();        // add and hand are mutually exclusive
  if(addMode && seriesMode) toggleSeries();    // add and series are mutually exclusive
  $('addBtn').classList.toggle('active', addMode);
  $('addBanner').classList.toggle('show', addMode);
  document.querySelectorAll('.ovl').forEach(o=>o.classList.toggle('adding', addMode || seriesMode));
  $('hint').textContent = addMode
    ? 'ADD MODE: click anywhere on a sheet to drop a new panel, then type its number.'
    : 'Click a panel to rename or delete it. Click “Add Missing Panel”, then click on a sheet to add a missing one.';
}

function toggleSeries(){
  seriesMode = !seriesMode;
  if(seriesMode){
    if(addMode) toggleAdd();
    if(handMode) toggleHand();
    seriesNext = null;        // start fresh each time the series begins
  }
  $('seriesBtn').classList.toggle('active', seriesMode);
  $('seriesBanner').classList.toggle('show', seriesMode);
  document.querySelectorAll('.ovl').forEach(o=>o.classList.toggle('adding', addMode || seriesMode));
  updateSeriesBanner();
}
function updateSeriesBanner(){
  $('seriesBanner').textContent = !seriesMode ? '' :
    (seriesNext == null
      ? '🔢 Series mode: click the FIRST panel on the print and enter its number.'
      : '🔢 Series mode: click to drop panel ' + seriesNext + ', then ' + (seriesNext+1)
        + ', … — one click each. Click “Add Panel Series” (or Esc) to stop.');
}

function pageXY(e, pi){
  const ovl = ovlOf(pi); const rect = ovl.getBoundingClientRect(); const d = dims[pi];
  return [ (e.clientX-rect.left)/rect.width*d.w, (e.clientY-rect.top)/rect.height*d.h ];
}

function onOverlayClick(e, pi){
  if(seriesMode){ placeSeries(e, pi); return; }
  if(!addMode) return;
  const [x,y] = pageXY(e, pi);
  const v = prompt('Panel number to add here:');
  if(v==null) return;
  const nn = String(v).trim(); if(!nn) return;
  if(locs[nn] && !confirm('Panel "'+nn+'" already exists — move it here?')) return;
  pushUndo();
  locs[nn] = { page: pi, bbox: [x-9, y-6, x+9, y+6] };
  setDirty(true); drawBoxes(); toast('Added panel ' + nn);   // stays red (not selected)
}

function placeSeries(e, pi){
  const [x,y] = pageXY(e, pi);
  let num;
  if(seriesNext == null){
    const v = prompt('Starting panel number for the series:');
    if(v == null) return;
    const n = parseInt(String(v).trim(), 10);
    if(isNaN(n)){ toast('Enter a whole number to start the series.'); return; }
    num = n; seriesNext = n + 1;
  } else {
    num = seriesNext; seriesNext++;
  }
  const nn = String(num);
  if(locs[nn]) toast('Panel ' + nn + ' moved here.');
  pushUndo();
  locs[nn] = { page: pi, bbox: [x-9, y-6, x+9, y+6] };
  setDirty(true); drawBoxes(); updateSeriesBanner();
}

function refreshDownloadLinks(){
  const t = '&t=' + Date.now();
  const bp = encodeURIComponent(curBp);
  const j = encodeURIComponent(JOB);
  const m = $('dlMarkedBtn'), f = $('dlFullBtn');
  if(m) m.href = '/api/panel-map/download/' + j + '?blueprint=' + bp + t;
  if(f) f.href = '/api/panel-map/download-full/' + j + '?blueprint=' + bp + t;
}

function changeSummary(before){
  let added=0, removed=0, moved=0;
  for(const k in locs){
    if(!(k in before)) added++;
    else if(JSON.stringify(locs[k].bbox) !== JSON.stringify(before[k].bbox)) moved++;
  }
  for(const k in before){ if(!(k in locs)) removed++; }
  const parts = [];
  if(added)   parts.push('+' + added + ' added');
  if(removed) parts.push(removed + ' deleted');
  if(moved)   parts.push(moved + ' moved/resized');
  return parts.length ? parts.join(', ') : 'no changes';
}

async function saveChanges(){
  const before = JSON.parse(savedSnapshot || '{}');
  $('saveBtn').disabled = true;
  try{
    const r = await fetch('/api/panel-map/update/'+encodeURIComponent(JOB), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ locations: locs })
    });
    const d = await r.json();
    if(d.error){ toast('Save failed: '+d.error); setDirty(true); return; }
    const summary = changeSummary(before);
    locs = d.panel_locations || locs;
    savedSnapshot = JSON.stringify(locs); undoStack = []; updateUndoBtn();
    setDirty(false); drawBoxes(); refreshDownloadLinks();
    toast('Saved ' + d.count + ' panels — ' + summary + '. Both documents regenerated.');
  }catch(e){ toast('Save failed.'); setDirty(true); }
}

/* Hand tool + scroll-to-zoom (the rest of the page is untouched) */
let handMode = false;
function toggleHand(){
  handMode = !handMode;
  $('handBtn').classList.toggle('active', handMode);
  $('body').classList.toggle('hand', handMode);
}
(function setupZoomPan(){
  const pane = $('body');
  pane.addEventListener('wheel', (e)=>{
    if(!(e.ctrlKey || e.metaKey)) return;   // plain scroll = navigate; Ctrl+scroll = zoom
    e.preventDefault();
    const cur = parseInt(document.documentElement.style.getPropertyValue('--pw')) || 1000;
    const step = Math.max(80, Math.round(cur * 0.12));   // proportional zoom steps
    const w = Math.max(500, Math.min(5000, cur + (e.deltaY < 0 ? step : -step)));
    document.documentElement.style.setProperty('--pw', w + 'px');
    const z = $('zoom'); if(z){ z.value = Math.max(+z.min, Math.min(+z.max, w)); }
    scheduleRerender();
  }, {passive:false});
  let drag=false, sx, sy, sl, st;
  pane.addEventListener('pointerdown', (e)=>{
    if(!handMode) return;
    drag=true; sx=e.clientX; sy=e.clientY; sl=pane.scrollLeft; st=pane.scrollTop;
    pane.classList.add('grabbing');
    try{ pane.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault();
  });
  pane.addEventListener('pointermove', (e)=>{
    if(!drag) return;
    pane.scrollLeft = sl - (e.clientX - sx);
    pane.scrollTop  = st - (e.clientY - sy);
  });
  const end = ()=>{ drag=false; pane.classList.remove('grabbing'); };
  pane.addEventListener('pointerup', end);
  pane.addEventListener('pointercancel', end);
})();

document.addEventListener('keydown', (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z'){ e.preventDefault(); undo(); return; }
  if(e.key === 'Escape'){
    if(seriesMode) toggleSeries();
    else if(addMode) toggleAdd();
    else clearSel();
  }
});
// keep the popup pinned to the panel while scrolling the document
$('body').addEventListener('scroll', ()=>{ if(selPanel!=null) positionActionBar(); }, {passive:true});

window.addEventListener('beforeunload', (e)=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });
load();
</script>
</body>
