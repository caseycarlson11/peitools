<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Editor — {{ out_name }}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d1520; color: white;
           display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.9rem; background: #111d30;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .tb-logo { width: 24px; height: 24px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .tb-title { font-size: 0.74rem; color: rgba(255,255,255,0.32); white-space: nowrap;
                max-width: 200px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .tb-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .tb-btn {
      display: flex; align-items: center; gap: 5px; padding: 0.38rem 0.75rem;
      border-radius: 7px; font-size: 0.76rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.06); color: white; transition: all 0.12s; flex-shrink: 0;
    }
    .tb-btn:hover:not(:disabled) { background: rgba(255,255,255,0.13); }
    .tb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .tb-btn.active { background: rgba(30,100,200,0.45); border-color: #60b4f0; color: #a8d8ff; }
    .tb-btn.green  { background: linear-gradient(135deg,#14532d,#16a34a); border-color: #22c55e; }
    .tb-btn.back   { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); display: none; }
    .tb-zoom { display: flex; align-items: center; flex-shrink: 0; }
    .tb-zoom button {
      width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.06); color: white; cursor: pointer;
      font-size: 1rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
    }
    .tb-zoom button:first-child { border-radius: 7px 0 0 7px; }
    .tb-zoom button:last-child  { border-radius: 0 7px 7px 0; }
    .tb-zoom button:hover { background: rgba(255,255,255,0.14); }
    .tb-zoom-label {
      padding: 0 0.5rem; font-size: 0.76rem; font-weight: 600; height: 28px;
      border-top: 1px solid rgba(255,255,255,0.13); border-bottom: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.04); min-width: 46px;
      display: flex; align-items: center; justify-content: center;
    }
    .tb-hint { font-size: 0.72rem; color: rgba(255,255,255,0.28); white-space: nowrap; flex-shrink: 0; }

    /* ── Main area: viewer + right panel ── */
    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* ── Viewer ── */
    .viewer {
      flex: 1; overflow-y: auto; overflow-x: auto; padding: 1.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
      background: #0a1018;
    }
    .page-wrap { position: relative; flex-shrink: 0; box-shadow: 0 6px 28px rgba(0,0,0,0.6); }
    .page-wrap canvas { display: block; }
    .page-label { text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.25); margin-top: 0.35rem; }
    .link-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* ── Right panel ── */
    .right-panel {
      flex-shrink: 0; background: #111d30;
      border-left: 1px solid rgba(255,255,255,0.09);
      display: flex; flex-direction: column; overflow: hidden;
      width: 54px;
    }
    .panel-header {
      padding: 0.4rem 0; font-size: 0.55rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0; text-align: center;
    }
    .panel-tools {
      flex: 1; padding: 4px; overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column; gap: 3px;
    }
    .panel-tools::-webkit-scrollbar { width: 3px; }
    .panel-tools::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
    .tool-btn {
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
      color: white; transition: all 0.12s; padding: 0;
    }
    .tool-btn:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.22); }
    .tool-btn.active {
      background: rgba(30,100,200,0.45); border-color: #60b4f0;
      box-shadow: 0 0 0 1px rgba(96,180,240,0.3);
    }
    .tool-dn { font-size: 0.72rem; font-weight: 800; color: #60b4f0; line-height: 1; }
    .no-tools { font-size: 0.75rem; color: rgba(255,255,255,0.3); padding: 0.75rem 0.5rem; line-height: 1.5; }
    .panel-tip {
      padding: 0.6rem 0.75rem; font-size: 0.68rem; color: rgba(255,255,255,0.25);
      border-top: 1px solid rgba(255,255,255,0.08); line-height: 1.5; flex-shrink: 0;
    }

    /* ── Link rects ── */
    .link-rect {
      position: absolute; background: rgba(255,165,50,0.2);
      border: 2px solid rgba(230,130,0,0.75); border-radius: 2px; cursor: pointer;
      transition: background 0.12s;
    }
    .link-rect:hover { background: rgba(255,165,50,0.42); }
    .link-rect.test-mode:hover { background: rgba(96,180,240,0.3); border-color: #60b4f0; cursor: pointer; }
    .dest-badge {
      position: absolute; top: -17px; left: 0; background: rgba(200,110,0,0.92);
      color: white; font-size: 9px; font-weight: 700; padding: 1px 4px;
      border-radius: 3px; white-space: nowrap; pointer-events: none; line-height: 1.4;
    }

    /* ── Ghost rect (follows cursor when tool active) ── */
    .ghost-rect {
      position: absolute; pointer-events: none;
      background: rgba(96,180,240,0.15); border: 2px dashed #60b4f0;
      border-radius: 2px; display: none;
    }

    /* ── Pending rect (placed, being dragged to final position) ── */
    .pending-rect {
      position: absolute;
      background: rgba(96,180,240,0.25); border: 2px solid #60b4f0;
      border-radius: 3px; cursor: move; z-index: 10;
    }
    .pending-rect .pending-badge {
      position: absolute; top: -18px; left: 0;
      background: #1e64c8; color: white; font-size: 9px; font-weight: 700;
      padding: 1px 5px; border-radius: 3px; white-space: nowrap;
    }
    .pending-rect .confirm-btn {
      position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%);
      background: #16a34a; color: white; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; white-space: nowrap; cursor: pointer;
      border: none; pointer-events: all;
    }
    .pending-rect .confirm-btn:hover { background: #15803d; }

    /* ── Draw rubber band (Add Link mode) ── */
    #drawRect {
      position: fixed; border: 2px dashed rgba(255,165,50,0.8);
      background: rgba(255,165,50,0.08); pointer-events: none; display: none; z-index: 100;
    }

    /* ── Modal ── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #182236; border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px; padding: 1.5rem; width: 300px;
      display: flex; flex-direction: column; gap: 0.9rem;
    }
    .modal h3 { font-size: 0.95rem; font-weight: 700; }
    .modal p  { font-size: 0.76rem; color: rgba(255,255,255,0.45); line-height: 1.5; }
    .modal input {
      width: 100%; padding: 0.55rem 0.75rem;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; color: white; font-family: 'Inter', sans-serif;
      font-size: 0.95rem; letter-spacing: 0.02em;
    }
    .modal input:focus { outline: none; border-color: #60b4f0; }
    .modal input.error { border-color: #f87171; }
    .modal-hint { font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    .modal-btns { display: flex; gap: 0.45rem; }
    .modal-btns button {
      flex: 1; padding: 0.55rem; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none;
    }
    .btn-confirm { background: #1e64c8; color: white; }
    .btn-confirm:hover { background: #2d8bef; }
    .btn-cancel  { background: rgba(255,255,255,0.09); color: white; }
    .btn-cancel:hover { background: rgba(255,255,255,0.17); }
    .btn-delete  { background: rgba(185,28,28,0.2); color: #fca5a5; border: 1px solid rgba(185,28,28,0.4) !important; }
    .btn-delete:hover { background: rgba(185,28,28,0.38); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(20,40,80,0.96); color: white; border: 1px solid rgba(96,180,240,0.3);
      padding: 0.5rem 1.2rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
      opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 300;
    }
    #toast.show { opacity: 1; }
    #loadingMsg {
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      color: rgba(255,255,255,0.45); padding: 4rem; font-size: 0.88rem;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #60b4f0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <a href="/"><img class="tb-logo" src="/static/logo.jpg" alt="PEI"/></a>
    <div class="tb-sep"></div>
    <div class="tb-title">{{ out_name }}</div>
    <div class="tb-sep"></div>

    <button class="tb-btn" id="modeSelect" onclick="setMode('select')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 3l14 9-7 1-4 7z"/></svg>
      Select
    </button>
    <button class="tb-btn" id="modeTest" onclick="setMode('test')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Test Links
    </button>
    <button class="tb-btn" id="modeAdd" onclick="setMode('add')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Link
    </button>

    <div class="tb-sep"></div>
    <div class="tb-zoom">
      <button onclick="zoom(-0.1)">−</button>
      <div class="tb-zoom-label" id="zoomLabel">100%</div>
      <button onclick="zoom(+0.1)">+</button>
    </div>
    <button class="tb-btn" onclick="zoom(0,1.0)" style="padding:0.38rem 0.5rem;font-size:0.72rem;">Reset</button>

    <div class="tb-sep"></div>
    <button class="tb-btn back" id="backBtn" onclick="goBack()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <button class="tb-btn green" id="saveBtn" onclick="saveAndDownload()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save & Download
    </button>
    <div class="tb-hint" id="tbHint">Click a link to move it — click again or anywhere else to set</div>
  </div>

  <!-- ── Main area ── -->
  <div class="main-area">

    <!-- Viewer -->
    <div class="viewer" id="viewer">
      <div id="loadingMsg">
        <div class="loading-spinner"></div>
        <span id="loadingText">Starting…</span>
      </div>
    </div>

    <!-- Right panel: D-page tools -->
    <div class="right-panel">
      <div class="panel-header">D</div>
      <div class="panel-tools" id="panelTools">
        <div class="no-tools" style="font-size:0.6rem;padding:4px;color:rgba(255,255,255,0.3);">—</div>
      </div>
    </div>

  </div>

  <!-- Rubber band (Add Link mode) -->
  <div id="drawRect"></div>

  <!-- Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">Edit Link</h3>
      <p id="modalDesc"></p>
      <input id="modalInput" placeholder="e.g. D15 or 42" autocomplete="off" spellcheck="false"/>
      <div class="modal-hint" id="modalHint"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-delete" id="btnDelete" onclick="deleteLink()" style="display:none">Delete</button>
        <button class="btn-confirm" onclick="confirmModal()">OK</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const JOB_ID = {{ job_id | tojson }};
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Default stamp size in PDF points
    const STAMP_W = 49, STAMP_H = 49;

    let pdfDoc    = null;
    let linksData = [];    // [{page, rect:[x0,y0,x1,y1], dest_page}]
    let pageInfos = [];    // [{width,height}] PDF points
    let dPages    = {};    // {"1":38,"15":52,...}  D-number → 0-based page index
    let mode      = '';    // '' | 'select' | 'test' | 'add' | 'stamp'
    let scale     = 1.0;
    let rendering = false;

    // Stamp tool state
    let stampTool    = null;

    // Drag-link state (no-mode drag)
    let draggingLink = null;  // {idx, el, overlay, page}

    // Modal state
    let activeEditIdx  = null;
    let pendingNewLink = null;

    // Back button state
    let savedScrollTop = null;

    // ────────────────────────────────────
    // Boot
    // ────────────────────────────────────
    async function boot() {
      const loadingMsg  = document.getElementById('loadingMsg');
      const loadingText = document.getElementById('loadingText');
      const setText = t => { if (loadingText) loadingText.textContent = t; };
      try {
        setText('Fetching link data…');
        const lr = await fetch(`/blueprint/hyperlinks/links/${JOB_ID}`);
        if (!lr.ok) throw new Error(`Links endpoint returned ${lr.status}`);
        const ld = await lr.json();
        pageInfos = ld.pages  || [];
        linksData = ld.links  || [];
        dPages    = ld.d_pages || {};

        setText('Loading PDF…');
        pdfDoc = await pdfjsLib.getDocument(`/blueprint/hyperlinks/view/${JOB_ID}`).promise;

        // Remove loading message immediately — pages appear as they render
        loadingMsg.remove();
        buildToolPanel();
        await renderAllPages(n => setText(`Rendering page ${n} of ${pdfDoc.numPages}…`));
        renderAllLinks();

      } catch(e) {
        if (loadingMsg) {
          loadingMsg.querySelector('.loading-spinner').style.display = 'none';
          loadingText.textContent = '⚠ ' + e.message;
          loadingText.style.color = '#f87171';
        }
      }
    }

    // ────────────────────────────────────
    // Right panel — D-page tools
    // ────────────────────────────────────
    function buildToolPanel() {
      const panel = document.getElementById('panelTools');
      const dns = Object.keys(dPages).sort((a,b) => +a - +b);
      const N = dns.length;

      if (!N) {
        panel.innerHTML = '<div class="no-tools">No D-pages detected. Use Add Link mode.</div>';
        document.getElementById('panelTip').textContent = 'Use Add Link mode in the toolbar to draw links.';
        return;
      }

      panel.innerHTML = '';
      dns.forEach(dn => {
        const btn = document.createElement('button');
        btn.className = 'tool-btn';
        btn.dataset.dn = dn;
        btn.title = `Link to D${dn} (page ${dPages[dn]+1})`;
        btn.innerHTML = `<span class="tool-dn">D${dn}</span>`;
        btn.addEventListener('click', () => selectTool(dn));
        panel.appendChild(btn);
      });
    }

    function selectTool(dn) {
      // Toggle off if same tool clicked again
      if (stampTool && stampTool.dn === dn) {
        clearStampTool();
        setMode('select');
        return;
      }
      clearPending();
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tool-btn[data-dn="${dn}"]`).classList.add('active');
      stampTool = { dn, destPage: dPages[dn] };
      setMode('stamp');
      showToast(`D${dn} selected — click the document to place`);
    }

    function clearStampTool() {
      stampTool = null;
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      hideAllGhosts();
      clearPending();
    }

    // ────────────────────────────────────
    // Render pages
    // ────────────────────────────────────
    async function renderAllPages(onPage) {
      if (rendering) return;
      rendering = true;
      clearPending();
      const viewer = document.getElementById('viewer');
      viewer.innerHTML = '';

      for (let pi = 1; pi <= pdfDoc.numPages; pi++) {
        const page = await pdfDoc.getPage(pi);
        const vp   = page.getViewport({ scale });

        const wrap = document.createElement('div');
        wrap.className = 'page-wrap';
        wrap.id = `page-wrap-${pi-1}`;
        wrap.dataset.pi = pi-1;

        // Placeholder so the page appears immediately at full size
        wrap.style.width  = Math.round(vp.width)  + 'px';
        wrap.style.height = Math.round(vp.height) + 'px';
        wrap.style.background = '#1a2540';

        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(vp.width);
        canvas.height = Math.round(vp.height);

        const overlay = document.createElement('div');
        overlay.className = 'link-overlay';
        overlay.dataset.pi = pi-1;

        const ghost = document.createElement('div');
        ghost.className = 'ghost-rect';
        ghost.dataset.ghost = pi-1;

        overlay.addEventListener('mousemove',  e => onOverlayMouseMove(e, overlay, ghost, pi-1));
        overlay.addEventListener('mouseleave', () => { ghost.style.display = 'none'; });
        overlay.addEventListener('mousedown',  e => onOverlayMouseDown(e, overlay, pi-1));

        wrap.appendChild(canvas);
        wrap.appendChild(overlay);
        wrap.appendChild(ghost);

        const label = document.createElement('div');
        label.className = 'page-label';
        label.textContent = `Page ${pi} of ${pdfDoc.numPages}`;

        // Add to DOM immediately so user sees pages appear one by one
        viewer.appendChild(wrap);
        viewer.appendChild(label);
        if (onPage) onPage(pi);

        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        wrap.style.background = '';  // clear placeholder bg once rendered
      }
      rendering = false;
    }

    // ────────────────────────────────────
    // Zoom
    // ────────────────────────────────────
    async function zoom(delta, absolute) {
      const s = absolute !== undefined ? absolute : Math.max(0.1, Math.min(4.0, Math.round((scale + delta) * 10) / 10));
      if (Math.abs(s - scale) < 0.001) return;

      // Save scroll position as a fraction of total scroll height
      const viewer = document.getElementById('viewer');
      const scrollFrac = viewer.scrollTop / (viewer.scrollHeight || 1);

      scale = s;
      document.getElementById('zoomLabel').textContent = Math.round(scale*100)+'%';
      await renderAllPages();
      renderAllLinks();

      // Restore scroll position proportionally
      viewer.scrollTop = scrollFrac * viewer.scrollHeight;
    }

    // ────────────────────────────────────
    // Coordinates
    // ────────────────────────────────────
    // fitz uses top-left origin, Y increases downward — same as CSS, no flip needed
    function pdfRectToCSS(pi, rect) {
      const info = pageInfos[pi]; if (!info) return null;
      const [x0,y0,x1,y1] = rect;
      return {
        left:   (x0/info.width*100)+'%',
        top:    (y0/info.height*100)+'%',
        width:  ((x1-x0)/info.width*100)+'%',
        height: ((y1-y0)/info.height*100)+'%',
      };
    }

    // Client XY → fitz space (top-left origin, Y down) — no flip
    function clientToPdf(overlay, pi, cx, cy) {
      const obr = overlay.getBoundingClientRect();
      const info = pageInfos[pi];
      const rx = (cx - obr.left) / overlay.offsetWidth;
      const ry = (cy - obr.top)  / overlay.offsetHeight;
      return { x: rx*info.width, y: ry*info.height };
    }

    // ────────────────────────────────────
    // Render links
    // ────────────────────────────────────
    function renderAllLinks() {
      document.querySelectorAll('.link-rect').forEach(el => el.remove());
      linksData.forEach((lk,idx) => renderLink(lk,idx));
    }

    function destLabel(destPage) {
      for (const [dn,pi] of Object.entries(dPages))
        if (pi === destPage) return `→ D${dn}`;
      return `→ p${destPage+1}`;
    }

    function renderLink(lk, idx) {
      const overlay = document.querySelector(`.link-overlay[data-pi="${lk.page}"]`);
      if (!overlay) return;
      const css = pdfRectToCSS(lk.page, lk.rect); if (!css) return;

      const div = document.createElement('div');
      div.className = 'link-rect' + (mode==='test' ? ' test-mode' : '');
      div.dataset.idx = idx;
      Object.assign(div.style, css);

      const badge = document.createElement('div');
      badge.className = 'dest-badge';
      badge.textContent = destLabel(lk.dest_page);
      div.appendChild(badge);

      div.addEventListener('click', e => {
        e.stopPropagation();
        if (mode==='select') openEditModal(idx);
        else if (mode==='test') scrollToPage(lk.dest_page);
        else if (mode==='') {
          if (draggingLink && draggingLink.idx === idx) {
            confirmDraggingLink(); // click same link again → set it
          } else {
            confirmDraggingLink(); // set any previous
            startDraggingLink(idx, div, overlay, lk.page);
          }
        }
      });
      overlay.appendChild(div);
    }

    // ────────────────────────────────────
    // No-mode drag: click link → follows cursor → click to set
    // ────────────────────────────────────
    function startDraggingLink(idx, el, overlay, page) {
      draggingLink = { idx, el, overlay, page };
      el.style.cursor = 'move';
      el.style.border = '2px solid #60b4f0';
      el.style.background = 'rgba(96,180,240,0.25)';
      showToast('Move mouse to reposition — click to set');
    }

    function confirmDraggingLink() {
      if (!draggingLink) return;
      const { idx, el, overlay, page } = draggingLink;
      const info = pageInfos[page];
      const x0 = parseFloat(el.style.left)   / 100 * info.width;
      const y0 = parseFloat(el.style.top)    / 100 * info.height;
      const x1 = x0 + parseFloat(el.style.width)  / 100 * info.width;
      const y1 = y0 + parseFloat(el.style.height) / 100 * info.height;
      linksData[idx].rect = [x0, y0, x1, y1];
      draggingLink = null;
      renderAllLinks();
    }

    // ────────────────────────────────────
    // Stamp: ghost rect follows cursor
    // ────────────────────────────────────
    function hideAllGhosts() {
      document.querySelectorAll('.ghost-rect').forEach(g => g.style.display='none');
    }

    function onOverlayMouseMove(e, overlay, ghost, pi) {
      if (mode !== 'stamp' || pendingStamp) { ghost.style.display='none'; return; }
      const info = pageInfos[pi]; if (!info) return;
      const obr = overlay.getBoundingClientRect();
      const rx = (e.clientX - obr.left) / overlay.offsetWidth;
      const ry = (e.clientY - obr.top)  / overlay.offsetHeight;
      const sw = STAMP_W/info.width*100, sh = STAMP_H/info.height*100;
      ghost.style.cssText = `display:block;
        left:${(rx*100 - sw/2)}%;
        top:${(ry*100 - sh/2)}%;
        width:${sw}%; height:${sh}%;`;
    }

    // ────────────────────────────────────
    // Overlay mousedown — stamp place OR draw
    // ────────────────────────────────────
    let drawing=false, drawStart=null, drawOverlay=null, drawPi=-1;
    const drawRect = document.getElementById('drawRect');

    function onOverlayMouseDown(e, overlay, pi) {
      if (e.target.classList.contains('link-rect')) return;
      if (e.target.classList.contains('pending-rect')) return;

      if (mode === 'stamp' && stampTool) {
        e.preventDefault();
        placePending(e, overlay, pi);
        return;
      }

      if (mode === 'add') {
        e.preventDefault();
        drawOverlay = overlay; drawPi = pi; drawing = true;
        drawStart = { x: e.clientX, y: e.clientY };
        drawRect.style.cssText = `display:block;left:${e.clientX}px;top:${e.clientY}px;width:0;height:0;`;
        return;
      }
    }

    // ────────────────────────────────────
    // Stamp workflow:
    //   Click 1 → place rect (state: 'placed')
    //   Click rect → drag mode (state: 'dragging', follows cursor)
    //   Click 3 → confirm
    // ────────────────────────────────────
    function placePending(e, overlay, pi) {
      const pt = clientToPdf(overlay, pi, e.clientX, e.clientY);
      const hw = STAMP_W/2, hh = STAMP_H/2;
      const rect = [pt.x-hw, pt.y-hh, pt.x+hw, pt.y+hh];
      linksData.push({ page: pi, rect, dest_page: stampTool.destPage });
      renderAllLinks();
      showToast(`D${stampTool.dn} placed`);
    }

    // Click on blank page area in no-mode → confirm dragging link
    document.addEventListener('click', e => {
      if (mode !== '') return;
      if (!draggingLink) return;
      if (e.target.classList.contains('link-rect')) return; // handled by link click
      confirmDraggingLink();
    });

    document.addEventListener('mousemove', e => {
      // Move dragging link (no-mode)
      if (draggingLink) {
        const { el, overlay } = draggingLink;
        const obr = overlay.getBoundingClientRect();
        const hw  = parseFloat(el.style.width)  / 2;
        const hh  = parseFloat(el.style.height) / 2;
        el.style.left = ((e.clientX - obr.left) / overlay.offsetWidth  * 100 - hw) + '%';
        el.style.top  = ((e.clientY - obr.top)  / overlay.offsetHeight * 100 - hh) + '%';
      }
      // Rubber band
      if (drawing) {
        const x = Math.min(e.clientX, drawStart.x);
        const y = Math.min(e.clientY, drawStart.y);
        drawRect.style.left   = x+'px'; drawRect.style.top    = y+'px';
        drawRect.style.width  = Math.abs(e.clientX-drawStart.x)+'px';
        drawRect.style.height = Math.abs(e.clientY-drawStart.y)+'px';
      }
      // Pending rect follows cursor in drag mode
      if (pendingStamp && pendingStamp.state === 'dragging') {
        const { el, overlay } = pendingStamp;
        const obr = overlay.getBoundingClientRect();
        const ow  = overlay.offsetWidth, oh = overlay.offsetHeight;
        const hw  = parseFloat(el.style.width)  / 2;
        const hh  = parseFloat(el.style.height) / 2;
        const nx  = (e.clientX - obr.left) / ow * 100 - hw;
        const ny  = (e.clientY - obr.top)  / oh * 100 - hh;
        el.style.left = nx + '%';
        el.style.top  = ny + '%';
      }
    });

    document.addEventListener('mouseup', e => {
      // Finish rubber band
      if (drawing) {
        drawing = false;
        drawRect.style.display = 'none';
        const w = Math.abs(e.clientX-drawStart.x), h = Math.abs(e.clientY-drawStart.y);
        if (w < 8 || h < 8) return;
        const info = pageInfos[drawPi];
        const obr = drawOverlay.getBoundingClientRect();
        const ow = drawOverlay.offsetWidth, oh = drawOverlay.offsetHeight;
        const x0s = Math.min(e.clientX,drawStart.x)-obr.left;
        const y0s = Math.min(e.clientY,drawStart.y)-obr.top;
        const x1s = Math.max(e.clientX,drawStart.x)-obr.left;
        const y1s = Math.max(e.clientY,drawStart.y)-obr.top;
        const x0=x0s/ow*info.width, y0=y0s/oh*info.height;
        const x1=x1s/ow*info.width, y1=y1s/oh*info.height;
        pendingNewLink = { page: drawPi, rect:[x0,y0,x1,y1] };
        openAddModal();
      }
      // Pending rect follows cursor until clicked — no mouseup handling needed
    });

    function confirmPending() {
      if (!pendingStamp || !stampTool) return;
      const { el, overlay, page } = pendingStamp;
      const info = pageInfos[page];
      // Read final position from the element's current CSS
      const leftPct = parseFloat(el.style.left)   / 100;
      const topPct  = parseFloat(el.style.top)    / 100;
      const wPct    = parseFloat(el.style.width)  / 100;
      const hPct    = parseFloat(el.style.height) / 100;
      const x0 = leftPct * info.width;
      const y0 = topPct  * info.height;
      const x1 = x0 + wPct * info.width;
      const y1 = y0 + hPct * info.height;
      linksData.push({ page, rect:[x0,y0,x1,y1], dest_page: stampTool.destPage });
      el.remove();
      pendingStamp = null;
      document.body.style.cursor = mode === 'stamp' ? 'crosshair' : '';
      renderAllLinks();
      showToast(`D${stampTool.dn} link set`);
    }

    // ────────────────────────────────────
    // Mode
    // ────────────────────────────────────
    function setMode(m) {
      // Toggle off if already active
      const next = (mode === m) ? '' : m;
      if (next !== 'stamp') clearStampTool();
      confirmDraggingLink();
      mode = next;
      document.getElementById('modeSelect').classList.toggle('active', next==='select');
      document.getElementById('modeTest').classList.toggle('active',   next==='test');
      document.getElementById('modeAdd').classList.toggle('active',    next==='add');
      const hints = {
        '':      'Click a link to move it — click again or anywhere else to set',
        select:  'Click an orange box to edit or delete it',
        test:    'Click an orange box to jump to its destination — use Back to return',
        add:     'Click and drag on the page to draw a new link',
        stamp:   'Click the document to place the link'
      };
      document.getElementById('tbHint').textContent = hints[next] || '';
      document.body.style.cursor = (m==='add'||m==='stamp') ? 'crosshair' : '';
      renderAllLinks();
    }

    // ────────────────────────────────────
    // Test mode: scroll to page
    // ────────────────────────────────────
    function scrollToPage(pi) {
      const viewer = document.getElementById('viewer');
      const el = document.getElementById(`page-wrap-${pi}`);
      if (!el) return;
      savedScrollTop = viewer.scrollTop;
      document.getElementById('backBtn').style.display = 'flex';
      el.scrollIntoView({ behavior:'smooth', block:'start' });
      el.style.outline = '3px solid #60b4f0';
      setTimeout(() => el.style.outline='', 1200);
      showToast(`Jumped to page ${pi+1} — press Back to return`);
    }

    function goBack() {
      if (savedScrollTop === null) return;
      document.getElementById('viewer').scrollTo({ top: savedScrollTop, behavior:'smooth' });
      savedScrollTop = null;
      document.getElementById('backBtn').style.display = 'none';
    }

    // ────────────────────────────────────
    // Parse destination input
    // ────────────────────────────────────
    function parseDest(raw) {
      const s = raw.trim().toUpperCase();
      const dm = s.match(/^D(\d+)$/);
      if (dm) {
        const pi = dPages[dm[1]];
        if (pi !== undefined) return { page: pi, label:`D${dm[1]}` };
        return { error: `D${dm[1]} not found in this document.` };
      }
      const n = parseInt(s);
      if (!isNaN(n) && n>=1 && n<=pdfDoc.numPages) return { page:n-1, label:`page ${n}` };
      return { error: `Enter a page number (1–${pdfDoc.numPages}) or D-label like D15.` };
    }

    function buildHint() {
      const dns = Object.keys(dPages).sort((a,b)=>+a-+b);
      if (!dns.length) return 'Enter a page number.';
      const sample = dns.slice(0,6).map(d=>`D${d}`).join(', ');
      return `Available: ${sample}${dns.length>6?'…':''}`;
    }

    // ────────────────────────────────────
    // Modal (for Select/Add modes)
    // ────────────────────────────────────
    function openEditModal(idx) {
      activeEditIdx=idx; pendingNewLink=null;
      const lk = linksData[idx];
      document.getElementById('modalTitle').textContent = 'Edit Link';
      document.getElementById('modalDesc').textContent = `Currently links to ${destLabel(lk.dest_page).replace('→ ','')}. Change destination:`;
      document.getElementById('modalInput').value = destLabel(lk.dest_page).replace('→ ','');
      document.getElementById('modalHint').textContent = buildHint();
      document.getElementById('btnDelete').style.display = 'block';
      document.getElementById('modalInput').classList.remove('error');
      document.getElementById('modalBg').classList.add('open');
      setTimeout(()=>{document.getElementById('modalInput').focus();document.getElementById('modalInput').select();},50);
    }

    function openAddModal() {
      activeEditIdx=null;
      document.getElementById('modalTitle').textContent = 'New Link';
      document.getElementById('modalDesc').textContent = 'Enter the destination page or D-label:';
      document.getElementById('modalInput').value = '';
      document.getElementById('modalHint').textContent = buildHint();
      document.getElementById('btnDelete').style.display = 'none';
      document.getElementById('modalInput').classList.remove('error');
      document.getElementById('modalBg').classList.add('open');
      setTimeout(()=>document.getElementById('modalInput').focus(),50);
    }

    function closeModal() {
      document.getElementById('modalBg').classList.remove('open');
      activeEditIdx=null; pendingNewLink=null;
    }

    function confirmModal() {
      const result = parseDest(document.getElementById('modalInput').value);
      if (result.error) {
        const inp = document.getElementById('modalInput');
        inp.classList.add('error');
        document.getElementById('modalHint').textContent = '⚠ '+result.error;
        setTimeout(()=>inp.classList.remove('error'),900);
        return;
      }
      if (activeEditIdx !== null) {
        linksData[activeEditIdx].dest_page = result.page;
        showToast(`Link updated → ${result.label}`);
      } else if (pendingNewLink) {
        linksData.push({...pendingNewLink, dest_page:result.page});
        showToast(`New link added → ${result.label}`);
      }
      closeModal(); renderAllLinks();
    }

    function deleteLink() {
      if (activeEditIdx===null) return;
      linksData.splice(activeEditIdx,1);
      closeModal(); renderAllLinks(); showToast('Link deleted');
    }

    document.getElementById('modalInput').addEventListener('keydown', e=>{
      if (e.key==='Enter') confirmModal();
      if (e.key==='Escape') closeModal();
    });

    // ────────────────────────────────────
    // Toast
    // ────────────────────────────────────
    let toastTimer=null;
    function showToast(msg) {
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
    }

    // ────────────────────────────────────
    // Save & Download
    // ────────────────────────────────────
    async function saveAndDownload() {
      const btn=document.getElementById('saveBtn');
      btn.disabled=true; btn.textContent='Saving…';
      try {
        const res = await fetch(`/blueprint/hyperlinks/save/${JOB_ID}`,{
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({links:linksData})
        });
        if (!res.ok){const j=await res.json().catch(()=>({}));throw new Error(j.error||'Save failed');}
        const blob=await res.blob();
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download='{{ out_name }}'; a.click();
        URL.revokeObjectURL(url); showToast('Downloaded!');
      } catch(e){ showToast('Error: '+e.message); }
      finally {
        btn.disabled=false;
        btn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Save & Download`;
      }
    }

    boot();
  </script>
</body>
</html>
