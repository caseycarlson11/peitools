<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | PEI Tools</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --card:    #1c2230;
      --border:  #30363d;
      --text:    #e6edf3;
      --text2:   #8b949e;
      --blue:    #60b4f0;
      --red:     #DB1523;
      --green:   #3fb950;
      --accent:  rgba(96,180,240,0.12);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-img { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; }
    .site-name { font-size: 0.9rem; font-weight: 800; }
    .site-name .blue { color: var(--blue); }
    .site-name .dim  { color: var(--text2); font-weight: 400; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none; font-size: 0.82rem; font-weight: 600;
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text2); }
    .logout-btn {
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .logout-btn:hover { color: var(--red); border-color: var(--red); }

    /* Login screen */
    .login-screen {
      min-height: calc(100vh - 57px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; width: 100%; max-width: 380px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .login-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--accent); border: 1px solid rgba(96,180,240,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .login-icon svg { width: 24px; height: 24px; stroke: var(--blue); fill: none; stroke-width: 1.8; }
    .login-card h2 { font-size: 1.2rem; font-weight: 800; }
    .login-card p  { font-size: 0.85rem; color: var(--text2); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.78rem; font-weight: 700; color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase; }
    .field input {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font-size: 0.9rem; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--blue); }
    .btn-primary {
      background: var(--blue); color: #0d1117; font-weight: 800;
      border: none; border-radius: 10px; padding: 12px;
      font-size: 0.9rem; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .error-msg { color: var(--red); font-size: 0.82rem; display: none; }

    /* Admin dashboard */
    .admin-screen { display: none; padding: 28px; max-width: 900px; margin: 0 auto; }
    .admin-screen.visible { display: block; }

    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text2);
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* Create job */
    .create-row { display: flex; gap: 10px; align-items: flex-end; }
    .create-row .field { flex: 1; }
    .btn-add {
      background: var(--blue); color: #0d1117; font-weight: 700;
      border: none; border-radius: 8px; padding: 10px 18px;
      font-size: 0.85rem; cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s; height: 40px;
    }
    .btn-add:hover { opacity: 0.85; }

    /* Job cards */
    .job-cards { display: flex; flex-direction: column; gap: 14px; }
    .job-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .job-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; cursor: pointer;
      transition: background 0.15s;
    }
    .job-card-header:hover { background: var(--card); }
    .job-card-header-left { display: flex; align-items: center; gap: 10px; }
    .job-card-title { font-size: 0.95rem; font-weight: 700; }
    .chevron { transition: transform 0.2s; font-size: 0.8rem; color: var(--text2); }
    .job-card.open .chevron { transform: rotate(180deg); }
    .btn-del-job {
      background: transparent; border: 1px solid transparent;
      color: var(--text2); border-radius: 6px;
      padding: 4px 10px; font-size: 0.75rem; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-del-job:hover { color: var(--red); border-color: var(--red); }

    .job-card-body { display: none; border-top: 1px solid var(--border); }
    .job-card.open .job-card-body { display: block; }

    /* Category sections inside card */
    .cat-section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
    .cat-section:last-child { border-bottom: none; }
    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .cat-name { font-size: 0.78rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 16px; text-align: center;
      color: var(--text2); font-size: 0.82rem;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--blue); background: var(--accent); color: var(--blue);
    }
    .drop-zone input[type=file] { display: none; }

    /* File items in admin */
    .admin-file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .admin-file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; border-radius: 8px; background: var(--card);
      border: 1px solid var(--border);
    }
    .admin-file-name { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .btn-del-file {
      background: transparent; border: none; color: var(--text2);
      cursor: pointer; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px;
      transition: color 0.15s;
    }
    .btn-del-file:hover { color: var(--red); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--green); color: #0d1117;
      font-weight: 700; font-size: 0.85rem;
      padding: 12px 20px; border-radius: 10px;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--red); color: white; }

    .empty-state { color: var(--text2); font-size: 0.82rem; padding: 24px; text-align: center; }
  </style>
</head>
<body>

<header class="site-header">
  <a class="header-left" href="/" style="text-decoration:none;color:inherit;">
    <img class="logo-img" src="/static/logo.jpg" alt="PEI"/>
    <div class="site-name"><span class="blue">PEI</span><span class="dim">tools.com</span> &mdash; Admin</div>
  </a>
  <div class="header-right">
    <a class="back-btn" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Home
    </a>
    <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">Log out</button>
  </div>
</header>

<!-- Login screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <h2>Admin Login</h2>
    <p>Enter the admin password to manage jobs and blueprints.</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div class="error-msg" id="errorMsg">Incorrect password. Try again.</div>
    <button class="btn-primary" onclick="login()">Sign In</button>
  </div>
</div>

<!-- Admin dashboard -->
<div class="admin-screen" id="adminScreen">

  <div class="section">
    <div class="section-title">Create New Job</div>
    <div class="create-row">
      <div class="field">
        <label>Job Name</label>
        <input type="text" id="newJobName" placeholder="e.g. Modesto Courthouse" onkeydown="if(event.key==='Enter')createJob()"/>
      </div>
      <button class="btn-add" onclick="createJob()">+ Create Job</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Manage Jobs &amp; Files</div>
    <div class="job-cards" id="jobCards">
      <div class="empty-state">Loading…</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = ['Blueprints', 'Packing Lists', 'Fab Sheets', 'DXF CAD FILE'];

// ── Auth ───────────────────────────────────────────────────
async function checkAuth() {
  const res  = await fetch('/admin/check-auth');
  const data = await res.json();
  if (data.authenticated) showDashboard();
}

async function login() {
  const pw  = document.getElementById('passwordInput').value;
  const res = await fetch('/admin/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({password: pw})
  });
  if (res.ok) {
    showDashboard();
  } else {
    document.getElementById('errorMsg').style.display = 'block';
  }
}

async function logout() {
  await fetch('/admin/logout', {method:'POST'});
  location.reload();
}

function showDashboard() {
  document.getElementById('loginScreen').style.display  = 'none';
  document.getElementById('adminScreen').classList.add('visible');
  document.getElementById('logoutBtn').style.display    = 'inline-block';
  loadJobs();
}

// ── Jobs ───────────────────────────────────────────────────
async function loadJobs() {
  const res  = await fetch('/api/jobs');
  const jobs = await res.json();
  const container = document.getElementById('jobCards');

  if (!jobs.length) {
    container.innerHTML = '<div class="empty-state">No jobs yet. Create one above.</div>';
    return;
  }

  container.innerHTML = '';
  for (const job of jobs) {
    const filesRes = await fetch(`/api/jobs/${encodeURIComponent(job)}`);
    const files    = await filesRes.json();
    container.appendChild(buildJobCard(job, files));
  }
}

function buildJobCard(job, files) {
  const card = document.createElement('div');
  card.className = 'job-card';
  card.id = `card_${CSS.escape(job)}`;

  const header = document.createElement('div');
  header.className = 'job-card-header';
  header.innerHTML = `
    <div class="job-card-header-left">
      <span class="job-card-title">${job}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn-del-job" onclick="deleteJob('${escJ(job)}', event)">Delete Job</button>
      <span class="chevron">▼</span>
    </div>`;
  header.onclick = (e) => {
    if (e.target.classList.contains('btn-del-job')) return;
    card.classList.toggle('open');
  };

  const body = document.createElement('div');
  body.className = 'job-card-body';

  CATEGORIES.forEach(cat => {
    const catFiles = files[cat] || [];
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = `sec_${CSS.escape(job)}_${CSS.escape(cat)}`;

    sec.innerHTML = `
      <div class="cat-header">
        <span class="cat-name">${cat}</span>
      </div>
      <div class="drop-zone" id="drop_${escId(job)}_${escId(cat)}">
        <input type="file" id="file_${escId(job)}_${escId(cat)}" multiple accept=".pdf"
               onchange="uploadFiles('${escJ(job)}','${escJ(cat)}',this.files)"/>
        📄 Drop PDF files here or <strong>click to browse</strong>
      </div>
      <div class="admin-file-list" id="list_${escId(job)}_${escId(cat)}"></div>`;

    // Render existing files
    const listEl = sec.querySelector('.admin-file-list');
    catFiles.forEach(f => listEl.appendChild(buildFileItem(job, cat, f)));

    // Drop zone events
    const dz  = sec.querySelector('.drop-zone');
    const inp = sec.querySelector('input[type=file]');
    dz.onclick = () => inp.click();
    dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('dragover'); };
    dz.ondragleave = () => dz.classList.remove('dragover');
    dz.ondrop = (e) => {
      e.preventDefault(); dz.classList.remove('dragover');
      uploadFiles(job, cat, e.dataTransfer.files);
    };

    body.appendChild(sec);
  });

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

function buildFileItem(job, cat, fname) {
  const item = document.createElement('div');
  item.className = 'admin-file-item';
  item.id = `fi_${escId(job)}_${escId(cat)}_${escId(fname)}`;
  item.innerHTML = `
    <span class="admin-file-name">📄 ${fname}</span>
    <button class="btn-del-file" onclick="deleteFile('${escJ(job)}','${escJ(cat)}','${escJ(fname)}')">✕ Remove</button>`;
  return item;
}

// ── Create job ─────────────────────────────────────────────
async function createJob() {
  const name = document.getElementById('newJobName').value.trim();
  if (!name) return;
  const res = await fetch('/admin/create-job', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
  const data = await res.json();
  if (data.ok) {
    document.getElementById('newJobName').value = '';
    showToast(`Job "${name}" created`);
    loadJobs();
  } else {
    showToast(data.error || 'Error', true);
  }
}

// ── Delete job ─────────────────────────────────────────────
async function deleteJob(job, e) {
  e.stopPropagation();
  if (!confirm(`Delete "${job}" and ALL its files? This cannot be undone.`)) return;
  const res = await fetch('/admin/delete-job', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({job})
  });
  if ((await res.json()).ok) {
    showToast(`Job "${job}" deleted`);
    loadJobs();
  }
}

// ── Upload files ───────────────────────────────────────────
async function uploadFiles(job, cat, fileList) {
  if (!fileList || !fileList.length) return;
  const form = new FormData();
  form.append('job', job);
  form.append('category', cat);
  for (const f of fileList) form.append('files', f);

  const res  = await fetch('/admin/upload', {method:'POST', body: form});
  const data = await res.json();

  if (data.ok && data.uploaded.length) {
    const listEl = document.getElementById(`list_${escId(job)}_${escId(cat)}`);
    data.uploaded.forEach(fname => {
      // Remove duplicate if re-uploading
      const existing = document.getElementById(`fi_${escId(job)}_${escId(cat)}_${escId(fname)}`);
      if (existing) existing.remove();
      listEl.appendChild(buildFileItem(job, cat, fname));
    });
    showToast(`${data.uploaded.length} file(s) uploaded`);
  } else {
    showToast(data.error || 'Upload failed', true);
  }
}

// ── Delete file ────────────────────────────────────────────
async function deleteFile(job, cat, fname) {
  if (!confirm(`Remove "${fname}"?`)) return;
  const res = await fetch('/admin/delete-file', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({job, category: cat, filename: fname})
  });
  if ((await res.json()).ok) {
    const el = document.getElementById(`fi_${escId(job)}_${escId(cat)}_${escId(fname)}`);
    if (el) el.remove();
    showToast(`"${fname}" removed`);
  }
}

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Helpers ────────────────────────────────────────────────
function escJ(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escId(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

checkAuth();
</script>
</body>
</html>
