<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In | PEI Tools</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="shortcut icon" type="image/x-icon" href="/static/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0;
      background-image: url('/static/bg.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) saturate(0.75);
      z-index: 0;
    }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,18,30,0.45);
      z-index: 1;
    }
    .card {
      position: relative; z-index: 2;
      background: rgba(22,27,34,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      margin: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    .logo-row {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 0.25rem;
    }
    .logo-img {
      width: 31px; height: 31px;
      border-radius: 7px; object-fit: cover;
    }
    .site-title { font-size: 1.96rem; font-weight: 900; color: white; }
    .site-title .blue { color: #60b4f0; }
    .site-title .dim { color: rgba(255,255,255,0.45); font-weight: 400; }
    h2 {
      font-size: 1.5rem; font-weight: 800; color: white;
      line-height: 1.2;
    }
    h2 span { color: #60b4f0; }
    p.sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 0.75rem; font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .field input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      color: white;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.3); }
    .field input:focus {
      border-color: #60b4f0;
      background: rgba(96,180,240,0.08);
    }
    .error {
      background: rgba(219,21,35,0.15);
      border: 1px solid rgba(219,21,35,0.4);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: #ff7070;
      font-weight: 600;
    }
    .btn-signin {
      background: #60b4f0;
      color: #0d1117;
      font-weight: 800;
      font-size: 0.95rem;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      font-family: inherit;
    }
    .btn-signin:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-signin:active { opacity: 1; transform: translateY(0); }
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="card">
    <div class="logo-row">
      <img class="logo-img" src="/static/logo.jpg" alt="Pacific Erectors Inc."/>
      <div class="site-title"><span class="blue">PEI</span><span class="dim">tools.com</span></div>
    </div>

<form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      {% if error %}
      <div class="error">⚠ {{ error }}</div>
      {% endif %}

      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@pacificerectors.com"
               autocomplete="email" required autofocus/>
      </div>

      <div class="field" style="margin-top:0.6rem;">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••••"
               autocomplete="current-password" required/>
      </div>

      <button class="btn-signin" style="margin-top:0.8rem; padding:10px; width:40%; margin-left:auto; margin-right:auto; display:block;" type="submit">Sign In →</button>
    </form>

    <p class="footer-note">Pacific Erectors Inc. · Internal use only</p>
  </div>
</body>
</html>
