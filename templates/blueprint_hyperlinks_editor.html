<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Editor — {{ out_name }}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d1520; color: white;
           display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Toolbar — never scrolls ── */
    .toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.9rem;
      background: #111d30;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0; flex-wrap: nowrap; overflow-x: auto;
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .tb-logo { width: 24px; height: 24px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .tb-title { font-size: 0.75rem; color: rgba(255,255,255,0.35); white-space: nowrap;
                max-width: 200px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .tb-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .tb-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 0.38rem 0.75rem; border-radius: 7px;
      font-size: 0.76rem; font-weight: 600; cursor: pointer; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.13); background: rgba(255,255,255,0.06);
      color: white; transition: all 0.12s; flex-shrink: 0;
    }
    .tb-btn:hover:not(:disabled) { background: rgba(255,255,255,0.13); }
    .tb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .tb-btn.active { background: rgba(30,100,200,0.45); border-color: #60b4f0; color: #a8d8ff; }
    .tb-btn.green { background: linear-gradient(135deg,#14532d,#16a34a); border-color: #22c55e; }
    .tb-zoom {
      display: flex; align-items: center; gap: 0; flex-shrink: 0;
    }
    .tb-zoom button {
      width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.06); color: white; cursor: pointer;
      font-size: 1rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .tb-zoom button:first-child { border-radius: 7px 0 0 7px; }
    .tb-zoom button:last-child  { border-radius: 0 7px 7px 0; }
    .tb-zoom button:hover { background: rgba(255,255,255,0.14); }
    .tb-zoom-label {
      padding: 0 0.5rem; font-size: 0.76rem; font-weight: 600;
      border-top: 1px solid rgba(255,255,255,0.13);
      border-bottom: 1px solid rgba(255,255,255,0.13);
      height: 28px; display: flex; align-items: center;
      background: rgba(255,255,255,0.04); min-width: 46px; justify-content: center;
    }
    .tb-hint { font-size: 0.72rem; color: rgba(255,255,255,0.28); white-space: nowrap; margin-left: 0.25rem; flex-shrink: 0; }

    /* ── Viewer scrolls independently ── */
    .viewer {
      flex: 1; overflow-y: auto; overflow-x: auto;
      padding: 1.5rem; display: flex; flex-direction: column;
      align-items: center; gap: 1.25rem;
      background: #0a1018;
    }

    .page-wrap { position: relative; flex-shrink: 0; box-shadow: 0 6px 28px rgba(0,0,0,0.6); }
    .page-wrap canvas { display: block; }
    .page-label { text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.25); margin-top: 0.35rem; }
    .link-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* ── Link rects ── */
    .link-rect {
      position: absolute;
      background: rgba(255,165,50,0.2);
      border: 2px solid rgba(230,130,0,0.75);
      border-radius: 2px; cursor: pointer;
      transition: background 0.12s;
    }
    .link-rect:hover { background: rgba(255,165,50,0.42); }
    .link-rect.test-mode { cursor: pointer; }
    .link-rect.test-mode:hover { background: rgba(96,180,240,0.35); border-color: #60b4f0; }
    .dest-badge {
      position: absolute; top: -17px; left: 0;
      background: rgba(200,110,0,0.92); color: white;
      font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
      white-space: nowrap; pointer-events: none; line-height: 1.4;
    }

    /* ── Rubber band ── */
    #drawRect {
      position: fixed; border: 2px dashed #60b4f0;
      background: rgba(96,180,240,0.08);
      pointer-events: none; display: none; z-index: 100;
    }

    /* ── Modal ── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #182236; border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px; padding: 1.5rem; width: 300px;
      display: flex; flex-direction: column; gap: 0.9rem;
    }
    .modal h3 { font-size: 0.95rem; font-weight: 700; }
    .modal p  { font-size: 0.76rem; color: rgba(255,255,255,0.45); line-height: 1.5; }
    .modal input {
      width: 100%; padding: 0.55rem 0.75rem;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; color: white;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; letter-spacing: 0.02em;
    }
    .modal input:focus { outline: none; border-color: #60b4f0; }
    .modal input.error { border-color: #f87171; }
    .modal-hint { font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    .modal-btns { display: flex; gap: 0.45rem; }
    .modal-btns button {
      flex: 1; padding: 0.55rem; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none;
    }
    .btn-confirm { background: #1e64c8; color: white; }
    .btn-confirm:hover { background: #2d8bef; }
    .btn-cancel  { background: rgba(255,255,255,0.09); color: white; }
    .btn-cancel:hover { background: rgba(255,255,255,0.17); }
    .btn-delete  { background: rgba(185,28,28,0.2); color: #fca5a5;
                   border: 1px solid rgba(185,28,28,0.4) !important; }
    .btn-delete:hover { background: rgba(185,28,28,0.38); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(30,100,200,0.95); color: white;
      padding: 0.55rem 1.2rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
      opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 300;
    }
    #toast.show { opacity: 1; }

    #loadingMsg { color: rgba(255,255,255,0.35); padding: 4rem; font-size: 0.88rem; }
  </style>
</head>
<body>

  <div class="toolbar">
    <a href="/"><img class="tb-logo" src="/static/logo.jpg" alt="PEI"/></a>
    <div class="tb-sep"></div>
    <div class="tb-title" id="docTitle">{{ out_name }}</div>
    <div class="tb-sep"></div>

    <!-- Mode buttons -->
    <button class="tb-btn" id="modeSelect" onclick="setMode('select')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 3l14 9-7 1-4 7z"/></svg>
      Select
    </button>
    <button class="tb-btn" id="modeTest" onclick="setMode('test')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Test Links
    </button>
    <button class="tb-btn" id="modeAdd" onclick="setMode('add')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Link
    </button>

    <div class="tb-sep"></div>

    <!-- Zoom -->
    <div class="tb-zoom">
      <button onclick="zoom(-0.25)" title="Zoom out">−</button>
      <div class="tb-zoom-label" id="zoomLabel">100%</div>
      <button onclick="zoom(+0.25)" title="Zoom in">+</button>
    </div>
    <button class="tb-btn" onclick="zoom(0, 1.0)" style="padding:0.38rem 0.5rem; font-size:0.72rem;">Reset</button>

    <div class="tb-sep"></div>
    <button class="tb-btn green" onclick="saveAndDownload()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save & Download
    </button>
    <div class="tb-hint" id="tbHint">Click a link to edit</div>
  </div>

  <div class="viewer" id="viewer">
    <div id="loadingMsg">Loading PDF…</div>
  </div>

  <div id="drawRect"></div>

  <!-- Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">Edit Link</h3>
      <p id="modalDesc"></p>
      <input id="modalInput" placeholder="e.g. D15 or 42" autocomplete="off" spellcheck="false"/>
      <div class="modal-hint" id="modalHint"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-delete" id="btnDelete" onclick="deleteLink()" style="display:none">Delete</button>
        <button class="btn-confirm" onclick="confirmModal()">OK</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const JOB_ID = {{ job_id | tojson }};
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc   = null;
    let linksData = [];   // [{page, rect:[x0,y0,x1,y1], dest_page}]
    let pageInfos = [];   // [{width,height}] in PDF points
    let dPages    = {};   // {"1":38, "15":52, ...}  D-number → 0-based page index
    let mode      = 'select';
    let scale     = 1.0;
    let rendering = false;

    // Modal state
    let activeEditIdx  = null;
    let pendingNewLink = null;

    // ────────────────────────────────────────────
    // Boot
    // ────────────────────────────────────────────
    async function boot() {
      const lr = await fetch(`/blueprint/hyperlinks/links/${JOB_ID}`);
      const ld = await lr.json();
      pageInfos = ld.pages;
      linksData = ld.links;
      dPages    = ld.d_pages || {};

      pdfDoc = await pdfjsLib.getDocument(`/blueprint/hyperlinks/view/${JOB_ID}`).promise;
      document.getElementById('loadingMsg').remove();
      await renderAllPages();
      renderAllLinks();
    }

    // ────────────────────────────────────────────
    // Render pages at current scale
    // ────────────────────────────────────────────
    async function renderAllPages() {
      if (rendering) return;
      rendering = true;
      const viewer = document.getElementById('viewer');
      viewer.innerHTML = '';

      for (let pi = 1; pi <= pdfDoc.numPages; pi++) {
        const page = await pdfDoc.getPage(pi);
        const vp   = page.getViewport({ scale });

        const wrap = document.createElement('div');
        wrap.className = 'page-wrap';
        wrap.id = `page-wrap-${pi - 1}`;
        wrap.dataset.pi = pi - 1;

        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(vp.width);
        canvas.height = Math.round(vp.height);

        const overlay = document.createElement('div');
        overlay.className = 'link-overlay';
        overlay.dataset.pi = pi - 1;
        overlay.addEventListener('mousedown', onOverlayMouseDown);

        wrap.appendChild(canvas);
        wrap.appendChild(overlay);

        const label = document.createElement('div');
        label.className = 'page-label';
        label.textContent = `Page ${pi}`;

        viewer.appendChild(wrap);
        viewer.appendChild(label);

        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      }
      rendering = false;
    }

    // ────────────────────────────────────────────
    // Zoom
    // ────────────────────────────────────────────
    async function zoom(delta, absolute) {
      const newScale = absolute !== undefined
        ? absolute
        : Math.max(0.25, Math.min(4.0, scale + delta));
      if (Math.abs(newScale - scale) < 0.001) return;
      scale = newScale;
      document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
      await renderAllPages();
      renderAllLinks();
    }

    // ────────────────────────────────────────────
    // Coordinate helpers
    // ────────────────────────────────────────────
    function pdfRectToCSS(pi, rect) {
      const info = pageInfos[pi];
      if (!info) return null;
      const [x0, y0, x1, y1] = rect;
      return {
        left:   (x0 / info.width  * 100) + '%',
        top:    ((info.height - y1) / info.height * 100) + '%',
        width:  ((x1 - x0) / info.width  * 100) + '%',
        height: ((y1 - y0) / info.height * 100) + '%',
      };
    }

    // ────────────────────────────────────────────
    // Render link overlays
    // ────────────────────────────────────────────
    function renderAllLinks() {
      document.querySelectorAll('.link-rect').forEach(el => el.remove());
      linksData.forEach((lk, idx) => renderLink(lk, idx));
    }

    function destLabel(destPage) {
      // Try to find a D-label for this page
      for (const [dn, pi] of Object.entries(dPages)) {
        if (pi === destPage) return `→ D${dn}`;
      }
      return `→ p${destPage + 1}`;
    }

    function renderLink(lk, idx) {
      const overlay = document.querySelector(`.link-overlay[data-pi="${lk.page}"]`);
      if (!overlay) return;
      const css = pdfRectToCSS(lk.page, lk.rect);
      if (!css) return;

      const div = document.createElement('div');
      div.className = 'link-rect' + (mode === 'test' ? ' test-mode' : '');
      div.dataset.idx = idx;
      Object.assign(div.style, css);

      const badge = document.createElement('div');
      badge.className = 'dest-badge';
      badge.textContent = destLabel(lk.dest_page);
      div.appendChild(badge);

      div.addEventListener('click', e => {
        e.stopPropagation();
        if (mode === 'select') openEditModal(idx);
        else if (mode === 'test') scrollToPage(lk.dest_page);
      });

      overlay.appendChild(div);
    }

    // ────────────────────────────────────────────
    // Test mode: scroll to destination page
    // ────────────────────────────────────────────
    function scrollToPage(pi) {
      const el = document.getElementById(`page-wrap-${pi}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // Flash highlight
        el.style.outline = '3px solid #60b4f0';
        setTimeout(() => el.style.outline = '', 1200);
        showToast(`Jumped to page ${pi + 1}`);
      }
    }

    // ────────────────────────────────────────────
    // Mode
    // ────────────────────────────────────────────
    function setMode(m) {
      mode = m;
      document.getElementById('modeSelect').classList.toggle('active', m === 'select');
      document.getElementById('modeTest').classList.toggle('active', m === 'test');
      document.getElementById('modeAdd').classList.toggle('active', m === 'add');
      const hints = {
        select: 'Click an orange box to edit or delete it',
        test:   'Click an orange box to jump to its destination',
        add:    'Click and drag on the page to draw a new link'
      };
      document.getElementById('tbHint').textContent = hints[m];
      document.body.style.cursor = m === 'add' ? 'crosshair' : '';
      renderAllLinks();
    }

    // ────────────────────────────────────────────
    // Draw new link
    // ────────────────────────────────────────────
    let drawing = false, drawStart = null, drawOverlay = null, drawPi = -1;
    const drawRect = document.getElementById('drawRect');

    function onOverlayMouseDown(e) {
      if (mode !== 'add') return;
      e.preventDefault();
      drawOverlay = e.currentTarget;
      drawPi = parseInt(drawOverlay.dataset.pi);
      drawing = true;
      drawStart = { x: e.clientX, y: e.clientY };
      drawRect.style.cssText = `display:block;left:${e.clientX}px;top:${e.clientY}px;width:0;height:0;`;
    }

    document.addEventListener('mousemove', e => {
      if (!drawing) return;
      const x = Math.min(e.clientX, drawStart.x);
      const y = Math.min(e.clientY, drawStart.y);
      drawRect.style.left   = x + 'px';
      drawRect.style.top    = y + 'px';
      drawRect.style.width  = Math.abs(e.clientX - drawStart.x) + 'px';
      drawRect.style.height = Math.abs(e.clientY - drawStart.y) + 'px';
    });

    document.addEventListener('mouseup', e => {
      if (!drawing) return;
      drawing = false;
      drawRect.style.display = 'none';

      const w = Math.abs(e.clientX - drawStart.x);
      const h = Math.abs(e.clientY - drawStart.y);
      if (w < 8 || h < 8) return;

      const obr = drawOverlay.getBoundingClientRect();
      const info = pageInfos[drawPi];
      const ow = drawOverlay.offsetWidth, oh = drawOverlay.offsetHeight;

      const x0s = Math.min(e.clientX, drawStart.x) - obr.left;
      const y0s = Math.min(e.clientY, drawStart.y) - obr.top;
      const x1s = Math.max(e.clientX, drawStart.x) - obr.left;
      const y1s = Math.max(e.clientY, drawStart.y) - obr.top;

      // PDF space (y from bottom)
      const x0 = x0s / ow * info.width;
      const y1 = info.height - (y0s / oh * info.height);
      const x1 = x1s / ow * info.width;
      const y0 = info.height - (y1s / oh * info.height);

      pendingNewLink = { page: drawPi, rect: [x0, y0, x1, y1] };
      openAddModal();
    });

    // ────────────────────────────────────────────
    // Parse destination input: "D15", "d5", "42"
    // ────────────────────────────────────────────
    function parseDest(raw) {
      const s = raw.trim().toUpperCase();
      const dm = s.match(/^D(\d+)$/);
      if (dm) {
        const dn = dm[1];
        const pi = dPages[dn];
        if (pi !== undefined) return { page: pi, label: `D${dn}` };
        return { error: `D${dn} was not found in this document.` };
      }
      const n = parseInt(s);
      if (!isNaN(n) && n >= 1 && n <= pdfDoc.numPages)
        return { page: n - 1, label: `page ${n}` };
      return { error: `Enter a page number (1–${pdfDoc.numPages}) or a D-label like D15.` };
    }

    function buildHint() {
      const dns = Object.keys(dPages).sort((a,b) => +a - +b);
      if (!dns.length) return 'Enter a page number.';
      const sample = dns.slice(0, 6).map(d => `D${d}`).join(', ');
      return `D-labels found: ${sample}${dns.length > 6 ? '…' : ''}`;
    }

    // ────────────────────────────────────────────
    // Modal
    // ────────────────────────────────────────────
    function openEditModal(idx) {
      activeEditIdx = idx; pendingNewLink = null;
      const lk = linksData[idx];
      document.getElementById('modalTitle').textContent = 'Edit Link';
      document.getElementById('modalDesc').textContent =
        `Currently links to ${destLabel(lk.dest_page).replace('→ ', '')}. Change destination:`;
      document.getElementById('modalInput').value = destLabel(lk.dest_page).replace('→ ', '');
      document.getElementById('modalHint').textContent = buildHint();
      document.getElementById('btnDelete').style.display = 'block';
      document.getElementById('modalInput').classList.remove('error');
      document.getElementById('modalBg').classList.add('open');
      setTimeout(() => { document.getElementById('modalInput').focus(); document.getElementById('modalInput').select(); }, 50);
    }

    function openAddModal() {
      activeEditIdx = null;
      document.getElementById('modalTitle').textContent = 'New Link';
      document.getElementById('modalDesc').textContent = 'Enter the destination page or D-label:';
      document.getElementById('modalInput').value = '';
      document.getElementById('modalHint').textContent = buildHint();
      document.getElementById('btnDelete').style.display = 'none';
      document.getElementById('modalInput').classList.remove('error');
      document.getElementById('modalBg').classList.add('open');
      setTimeout(() => document.getElementById('modalInput').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modalBg').classList.remove('open');
      activeEditIdx = null; pendingNewLink = null;
    }

    function confirmModal() {
      const raw = document.getElementById('modalInput').value;
      const result = parseDest(raw);
      if (result.error) {
        const inp = document.getElementById('modalInput');
        inp.classList.add('error');
        document.getElementById('modalHint').textContent = '⚠ ' + result.error;
        setTimeout(() => inp.classList.remove('error'), 900);
        return;
      }
      if (activeEditIdx !== null) {
        linksData[activeEditIdx].dest_page = result.page;
        showToast(`Link updated → ${result.label}`);
      } else if (pendingNewLink) {
        linksData.push({ ...pendingNewLink, dest_page: result.page });
        showToast(`New link added → ${result.label}`);
      }
      closeModal();
      renderAllLinks();
    }

    function deleteLink() {
      if (activeEditIdx === null) return;
      linksData.splice(activeEditIdx, 1);
      closeModal();
      renderAllLinks();
      showToast('Link deleted');
    }

    document.getElementById('modalInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmModal();
      if (e.key === 'Escape') closeModal();
    });

    // ────────────────────────────────────────────
    // Toast
    // ────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ────────────────────────────────────────────
    // Save & Download
    // ────────────────────────────────────────────
    async function saveAndDownload() {
      const btn = document.querySelector('.tb-btn.green');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch(`/blueprint/hyperlinks/save/${JOB_ID}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ links: linksData })
        });
        if (!res.ok) { const j = await res.json().catch(()=>({})); throw new Error(j.error || 'Save failed'); }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = '{{ out_name }}'; a.click();
        URL.revokeObjectURL(url);
        showToast('Downloaded!');
      } catch(e) {
        showToast('Error: ' + e.message);
      } finally {
        btn.disabled = false;
