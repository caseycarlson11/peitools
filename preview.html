      filter: brightness(0.35) saturate(0.75);
      z-index: 0;
    }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,18,30,0.45);
      z-index: 1;
    }
    .content {
      position: relative; z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 480px;
      padding: 2rem;
    }
    .header {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 0.3rem 0.75rem 0.3rem 0.3rem;
      margin-bottom: 0.5rem;
    }
    .logo-img {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .site-title {
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }
    .site-title .blue { color: #60b4f0; }
    .site-title .dim { color: rgba(255,255,255,0.45); font-weight: 400; }
    .btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 1.2rem 1.75rem;
      border-radius: 14px;
      font-size: 1.05rem; font-weight: 700;
      color: white; text-decoration: none;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      cursor: pointer;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      background: rgba(255,255,255,0.16);
    }
    .btn:hover .arrow { transform: translateX(5px); }
    .btn-left { display: flex; align-items: center; gap: 14px; }
    .btn-icon {
      width: 38px; height: 38px;
      background: rgba(30, 100, 200, 0.45);
      border: 1px solid rgba(96, 180, 240, 0.4);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-icon svg { width: 20px; height: 20px; }
    .arrow { display: flex; transition: transform 0.2s; }
    .arrow svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2.5; }
  </style>
